# ── Rate Limit 정의 (IP당 초당 20개 제한) ─────────────────────
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/s;

server {
    listen 80;
    server_name heartopia-life.me www.heartopia-life.me;

    server_tokens off;     # Nginx 버전 정보 노출 방지
    client_max_body_size 10M;


    # ── 악성 SQL 인젝션 봇 IP 차단 ─────────────────────────────
    deny 122.136.188.132;

    # ── Rate Limiting (burst=30: 순간 30개까지 허용, 초과 시 429) ──
    limit_req zone=req_limit burst=30 nodelay;
    limit_req_status 429;

    # ── PHP 파일 접근 차단 (우리 서버는 Java, PHP 없음) ───────────
    location ~* "\.php$" {
        return 444;
    }

    # ── .git 경로 탈취 시도 차단 ───────────────────────────────
    location ~* "/\.git" {
        return 444;
    }

    location / {
        proxy_pass http://app-blue:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 백엔드 응답 타임아웃 설정
        proxy_connect_timeout    10s;
        proxy_send_timeout       60s;
        proxy_read_timeout       60s;
    }

    # 서버 에러 시 커스텀 메시지
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 200 '<html><body><h2>잠시 점검 중입니다. 잠시 후 다시 시도해 주세요.</h2></body></html>';
        add_header Content-Type text/html;
    }
}
