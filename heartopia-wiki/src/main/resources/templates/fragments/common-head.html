<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="common_head">
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PWY9Q457PR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-PWY9Q457PR');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="GRafLBwI_mqrK0nX44Q2k3YUSY-zPSOMb61V1_14110" />
    <!-- 네이버 서치어드바이저 소유 인증 -->
    <meta name="naver-site-verification" content="06f32035e51c69718507d0d7303e65c6bcb643f2" />
    <title th:text="${pageTitle != null ? pageTitle + ' - 두두타 도감' : '두두타 도감 | heartopia life'}">두두타 도감 | heartopia life</title>
    <meta name="description" th:attr="content=${pageDescription != null ? pageDescription : '두두타(두근두근타운) 공략 도감! 물고기, 벌레, 새, 동물, 요리, 작물 정보와 인터랙티브 지도를 제공하는 비공식 종합 도감입니다.'}">
    <meta name="keywords" content="두두타 도감, 두근두근타운, 두두타, heartopia, 공략, 도감, 지도, 주민 정보, 요리, 위키">
    <!-- Open Graph (카카오톡/디스코드 링크 공유 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:url" th:content="${canonicalUrl != null ? canonicalUrl : 'https://heartopia-life.me/wiki'}">
    <meta property="og:title" th:attr="content=${pageTitle != null ? pageTitle + ' - 두두타 도감' : '두두타 도감 | heartopia life'}">
    <meta property="og:description" th:attr="content=${pageDescription != null ? pageDescription : '두근두근라이프(하토피아) 공략 도감! 물고기, 벌레, 새, 동물, 요리, 작물 정보와 인터랙티브 지도를 제공합니다.'}">
    <!-- CSRF Tokens for Frontend API Calls -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <meta property="og:image" content="https://heartopia-life.me/images/logo/main_logo.png">
    <!-- Canonical: 중복 페이지 방지 -->
    <link rel="canonical" th:href="${canonicalUrl != null ? canonicalUrl : 'https://heartopia-life.me/wiki'}">
    <link rel="icon" type="image/png" href="/images/logo/header_logo.png">
    <!-- JSON-LD: Google 사이트 이름 인식용 구조화 데이터 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "두두타 도감",
      "alternateName": ["두근두근타운 도감", "Heartopia Life"],
      "url": "https://heartopia-life.me/",
      "description": "두두타(두근두근타운) 공략 도감! 물고기, 벌레, 새, 동물, 요리, 작물 정보와 인터랙티브 지도를 제공하는 비공식 종합 도감입니다.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://heartopia-life.me/wiki/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css(v=1.2)}">
    <link rel="stylesheet" th:href="@{/css/checklist-sync.css(v=1.3)}">

    <!-- Checklist Global Sync Scripts -->
    <script src="/js/checklist-core.js"></script>
    <script src="/js/checklist-sync.js" defer></script>
    <script>
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG') {
                const container = e.target.closest('.wiki-item-image, .detail-image-area, .villager-avatar, .npc-avatar');
                if (container) {
                    e.target.style.display = 'none';
                    const fallback = container.querySelector('.fallback-icon');
                    if (fallback) {
                        fallback.style.display = 'flex';
                    }
                }
            }
        }, true);
    </script>
</head>

</html>
