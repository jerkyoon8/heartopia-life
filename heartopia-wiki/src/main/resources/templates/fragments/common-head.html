<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="common_head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="GRafLBwI_mqrK0nX44Q2k3YUSY-zPSOMb61V1_14110" />
    <title>두근두근라이프</title>
    <meta name="description" content="설레는 모험이 시작되는 곳, 두근두근 타운! 모든 주민 정보와 아이템, 컬렉션 가이드를 한곳에서 만나보세요. 당신의 두근두근 라이프를 위한 완벽한 동반자, 비공식 위키입니다.">
    <meta name="keywords" content="두근두근라이프, 두근두근타운, 위키, 게임 가이드, 아이템 정보">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://heartopia-life.me/">
    <meta property="og:title" content="두근두근 라이프 위키 - 설레는 타운 생활의 모든 것">
    <meta property="og:description" content="두근두근 타운에서의 생활이 더 즐거워지는 곳! 아이템부터 주민 정보까지 모든 가이드를 확인하세요.">
    <!-- CSRF Tokens for Frontend API Calls -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <meta property="og:image" content="/images/logo/main_logo.png">
    <link rel="icon" type="image/png" href="/images/logo/header_logo.png">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <script>
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG') {
                const container = e.target.closest('.wiki-item-image, .detail-image-area, .villager-avatar, .npc-avatar');
                if (container) {
                    e.target.style.display = 'none';
                    const fallback = container.querySelector('.fallback-icon');
                    if (fallback) {
                        fallback.style.display = 'flex';
                    }
                }
            }
        }, true);
    </script>
</head>

</html>
