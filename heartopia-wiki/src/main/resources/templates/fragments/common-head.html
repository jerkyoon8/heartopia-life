<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="common_head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="GRafLBwI_mqrK0nX44Q2k3YUSY-zPSOMb61V1_14110" />
    <!-- TODO: 네이버 서치어드바이저에서 발급받은 인증 코드를 아래에 입력하세요 -->
    <!-- <meta name="naver-site-verification" content="네이버에서_발급받은_코드" /> -->
    <title th:text="${pageTitle != null ? pageTitle + ' - 두두타 도감' : '두두타 도감 | heartopia life'}">두두타 도감 | heartopia life</title>
    <meta name="description" th:attr="content=${pageDescription != null ? pageDescription : '두근두근라이프(하토피아) 공략 도감! 물고기, 벌레, 새, 동물, 요리, 작물 정보와 인터랙티브 지도를 제공하는 비공식 종합 위키입니다.'}">
    <meta name="keywords" content="두두타 도감, 두근두근라이프, 하토피아, heartopia, 두두타, 공략, 도감, 지도, 주민 정보, 요리, 위키">
    <!-- Open Graph (카카오톡/디스코드 링크 공유 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://heartopia-life.me/">
    <meta property="og:title" th:attr="content=${pageTitle != null ? pageTitle + ' - 두두타 도감' : '두두타 도감 | heartopia life'}">
    <meta property="og:description" th:attr="content=${pageDescription != null ? pageDescription : '두근두근라이프(하토피아) 공략 도감! 물고기, 벌레, 새, 동물, 요리, 작물 정보와 인터랙티브 지도를 제공합니다.'}">
    <!-- CSRF Tokens for Frontend API Calls -->
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <meta property="og:image" content="/images/logo/main_logo.png">
    <link rel="icon" type="image/png" href="/images/logo/header_logo.png">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <script>
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG') {
                const container = e.target.closest('.wiki-item-image, .detail-image-area, .villager-avatar, .npc-avatar');
                if (container) {
                    e.target.style.display = 'none';
                    const fallback = container.querySelector('.fallback-icon');
                    if (fallback) {
                        fallback.style.display = 'flex';
                    }
                }
            }
        }, true);
    </script>
</head>

</html>
