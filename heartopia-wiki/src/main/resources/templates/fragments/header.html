<html xmlns:th="http://www.thymeleaf.org">

<body>
    <nav th:fragment="header" class="fixed-top">
        <!-- Paperlogy Font -->
        <style>

            @font-face {
                font-family: 'Paperlogy';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
                font-weight: 400;
                font-display: swap;
            }

            @font-face {
                font-family: 'Paperlogy';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
                font-weight: 700;
                font-display: swap;
            }

            /* General Header Styles */
            .header-wrapper {
                width: 100%;
                background-color: var(--navbar-bg, #ffffff);
                border-bottom: 1px solid var(--border-color, #a7d7f9);
                box-shadow: 0 2px 10px var(--shadow, rgba(0, 0, 0, 0.05));
                z-index: 1000;
                transition: background-color 0.3s, border-color 0.3s;
            }

            .header-content-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 15px;
            }

            /* Top Bar (Logo and Dark Mode Toggle) */
            .top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 70px;
            }

            .brand-logo {
                display: flex;
                align-items: center;
                gap: 12px;
                text-decoration: none !important;
            }

            .brand-logo img {
                height: 45px;
                width: auto;
                object-fit: contain;
            }

            .brand-logo span {
                font-family: 'Paperlogy', sans-serif;
                font-weight: 700;
                font-size: 22px;
                color: var(--text-color, #333);
                letter-spacing: -0.5px;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* Dark Mode Toggle */
            .theme-toggle-btn {
                background: none;
                border: none;
                color: var(--text-color, #333);
                font-size: 20px;
                cursor: pointer;
                padding: 8px;
                border-radius: 50%;
                transition: background-color 0.2s, color 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .theme-toggle-btn:hover {
                background-color: var(--nav-hover, #f0f2f5);
            }

            .theme-toggle-btn .fa-sun {
                display: none;
            }

            [data-theme='dark'] .theme-toggle-btn .fa-moon {
                display: none;
            }

            [data-theme='dark'] .theme-toggle-btn .fa-sun {
                display: inline-block;
                color: #ffc107;
            }

            /* Nav Bar & Mega Menu Wrapper */
            .nav-mega-wrapper {
                position: relative;
            }

            /* Nav Bar (Horizontal Menu) */
            .nav-bar {
                border-top: 1px solid var(--border-subtle, #f0f0f0);
                height: 50px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .nav-bar::-webkit-scrollbar {
                display: none;
            }

            .navbar-nav {
                display: flex;
                flex-direction: row !important;
                list-style: none;
                padding: 0;
                margin: 0;
                gap: 5px;
            }

            .nav-link {
                display: block;
                padding: 0 20px !important;
                line-height: 50px;
                font-family: 'Paperlogy', sans-serif;
                font-weight: 400;
                font-size: 15px;
                color: var(--text-color, #445);
                text-decoration: none !important;
                transition: color 0.2s, background-color 0.2s;
                border-radius: 4px;
            }

            .nav-link:hover {
                background-color: var(--nav-hover, #f8f9fa);
                color: #0d6efd;
            }

            /* Mega Menu Container */
            .mega-menu-container {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: var(--navbar-bg, #ffffff);
                border: 1px solid var(--border-color, #a7d7f9);
                border-top: none;
                box-shadow: 0 10px 25px var(--shadow, rgba(0, 0, 0, 0.1));
                border-radius: 0 0 12px 12px;
                padding: 30px;
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px);
                transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
                z-index: 999;
            }

            /* Show Mega Menu when hovering over the wrapper */
            .nav-mega-wrapper:hover .mega-menu-container {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }

            .mega-menu-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 40px;
            }

            .mega-column h5 {
                font-family: 'Paperlogy', sans-serif;
                font-size: 16px;
                font-weight: 700;
                color: #0d6efd;
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 2px solid #e7f1ff;
            }

            .mega-column ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .mega-link {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                color: var(--text-color, #555);
                text-decoration: none !important;
                font-size: 14.5px;
                border-radius: 8px;
                transition: all 0.2s;
            }

            .mega-link i {
                width: 20px;
                text-align: center;
                font-size: 16px;
                color: #889;
                transition: color 0.2s;
            }

            .mega-link:hover {
                background-color: #e7f1ff;
                color: #0d6efd;
                padding-left: 18px;
            }

            .mega-link:hover i {
                color: #0d6efd;
            }

            /* --- Visitor Counter --- */
            .visitor-counter {
                font-size: 0.85rem;
                color: var(--stat-label, #777);
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--nav-hover, #f8f9fa);
                padding: 4px 12px;
                border-radius: 12px;
                margin-left: auto;
                /* Push to right in flex parent */
                border: 1px solid var(--border-subtle, #eee);
            }

            .visitor-counter i {
                color: #ff80ab;
            }

            .visitor-count-num {
                font-weight: 700;
                color: var(--text-color, #333);
            }

            /* Mobile Menu (Hidden for now as requested simple) */
            @media (max-width: 991px) {
                .mega-menu-container {
                    display: none;
                }

                .nav-link {
                    padding: 0 15px !important;
                    font-size: 14px;
                    white-space: nowrap;
                }

                .header-wrapper {
                    position: sticky;
                    top: 0;
                }

                .nav-bar {
                    justify-content: flex-start;
                }

                .visitor-counter {
                    display: none;
                    /* Hide visitor counter on small screens in the nav bar */
                }

                .brand-logo img:first-child {
                    height: 30px !important;
                }

                .brand-logo img:last-child {
                    height: 22px !important;
                }

                .top-bar {
                    height: 55px;
                }

                .brand-logo span {
                    font-size: 18px;
                }
            }
        </style>

        <div class="header-wrapper">
            <div class="header-content-container">
                <div class="top-bar">
                    <a th:href="@{/wiki}" class="brand-logo">
                        <img src="/images/logo/header_logo.png" alt="Icon" style="height: 35px; width: auto;">
                        <img src="/images/logo/main_logo.png" alt="Logo"
                            style="height: 28px; width: auto; margin-top: 2px;">
                    </a>

                    <div class="header-actions">
                        <!-- Dark Mode Toggle -->
                        <button class="theme-toggle-btn" id="themeToggle" title="테마 변경">
                            <i class="fas fa-moon"></i>
                            <i class="fas fa-sun"></i>
                        </button>
                    </div>
                </div>

                <!-- Nav Bar + Mega Menu Wrapper -->
                <div class="nav-mega-wrapper">
                    <div class="nav-bar d-flex align-items-center">
                        <ul class="navbar-nav flex-grow-1">
                            <!-- Simple Links -->
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki/codes}">쿠폰</a></li>

                            <!-- Trigger Links (Hovering these keeps menu open because they are in wrapper) -->
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">컬렉션</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">아이템들</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">기타</a></li>
                            <!-- 지도 link removed from here as it is already above in some cases or redundant -->
                        </ul>

                        <!-- Visitor Counter (Icons only) -->
                        <div class="visitor-counter" th:if="${totalVisitors != null}">
                            <div class="d-flex align-items-center gap-2">
                                <div class="d-flex align-items-center gap-1" title="전체 조회수">
                                    <i class="fas fa-eye" style="color: #889;"></i>
                                    <span class="visitor-count-num"
                                        th:text="${#numbers.formatInteger(totalVisitors, 0, 'COMMA')}">1,234</span>
                                </div>
                                <div
                                    style="width: 1px; height: 10px; background-color: var(--border-subtle, #ddd); margin: 0 4px;">
                                </div>
                                <div class="d-flex align-items-center gap-1" title="48시간 조회수">
                                    <i class="fas fa-bolt" style="color: #ffc107;"></i>
                                    <span class="visitor-count-num"
                                        th:text="${#numbers.formatInteger(recent48hVisitors, 0, 'COMMA')}">56</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Mega Dropdown (Full Width Content) -->
                    <div class="mega-menu-container">
                        <div class="mega-menu-grid">
                            <!-- Column 1: 컬렉션 -->
                            <div class="mega-column">
                                <h5>컬렉션</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/collections/fish}" class="mega-link"><i
                                                class="fas fa-fish"></i> 물고기</a></li>
                                    <li><a th:href="@{/wiki/collections/bug}" class="mega-link"><i
                                                class="fas fa-bug"></i> 벌레</a></li>
                                    <li><a th:href="@{/wiki/collections/bird}" class="mega-link"><i
                                                class="fas fa-crow"></i> 새</a></li>
                                    <li><a th:href="@{/wiki/collections/animal}" class="mega-link"><i
                                                class="fas fa-paw"></i> 동물</a></li>
                                </ul>
                            </div>

                            <!-- Column 2: 아이템들 -->
                            <div class="mega-column">
                                <h5>아이템들</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/items/cooking}" class="mega-link"><i
                                                class="fas fa-utensils"></i>
                                            요리</a></li>
                                    <li><a th:href="@{/wiki/items/crops}" class="mega-link"><i
                                                class="fas fa-carrot"></i>
                                            작물</a></li>
                                    <li><a th:href="@{/wiki/items/flowers}" class="mega-link"><i
                                                class="fas fa-seedling"></i>
                                            꽃</a></li>
                                    <li><a th:href="@{/wiki/collections/forageable}" class="mega-link"><i
                                                class="fas fa-leaf"></i> 채집물</a></li>
                                </ul>
                            </div>

                            <!-- Column 3: 기타 -->
                            <div class="mega-column">
                                <h5>기타</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/others/villagers}" class="mega-link"><i
                                                class="fas fa-user-group"></i> 주민들</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dark Mode Persistence Script -->
        <script>
            (function () {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
            })();

            document.addEventListener('DOMContentLoaded', () => {
                const themeToggle = document.getElementById('themeToggle');

                themeToggle.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            });
        </script>
    </nav>
</body>

</html>
