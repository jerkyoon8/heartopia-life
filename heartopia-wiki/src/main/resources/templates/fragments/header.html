<html xmlns:th="http://www.thymeleaf.org">

<body>
    <nav th:fragment="header" class="fixed-top">
        <!-- Paperlogy Font -->
        <style>

            @font-face {
                font-family: 'Paperlogy';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
                font-weight: 400;
                font-display: swap;
            }

            @font-face {
                font-family: 'Paperlogy';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
                font-weight: 700;
                font-display: swap;
            }

            /* General Header Styles */
            .header-wrapper {
                width: 100%;
                background-color: var(--navbar-bg, #ffffff);
                border-bottom: 1px solid var(--border-color, #a7d7f9);
                box-shadow: 0 2px 10px var(--shadow, rgba(0, 0, 0, 0.05));
                z-index: 1000;
                transition: background-color 0.3s, border-color 0.3s;
            }

            .header-content-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 15px;
            }

            /* Top Bar (Logo and Dark Mode Toggle) */
            .top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 70px;
            }

            .brand-logo {
                display: flex;
                align-items: center;
                gap: 12px;
                text-decoration: none !important;
            }

            .brand-logo img {
                height: 45px;
                width: auto;
                object-fit: contain;
            }

            .brand-logo span {
                font-family: 'Paperlogy', sans-serif;
                font-weight: 700;
                font-size: 22px;
                color: var(--text-color, #333);
                letter-spacing: -0.5px;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* Dark Mode Toggle */
            .theme-toggle-btn {
                background: none;
                border: none;
                color: var(--text-color, #333);
                font-size: 20px;
                cursor: pointer;
                padding: 8px;
                border-radius: 50%;
                transition: background-color 0.2s, color 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .theme-toggle-btn:hover {
                background-color: var(--nav-hover, #f0f2f5);
            }

            .theme-toggle-btn .fa-sun {
                display: none;
            }

            [data-theme='dark'] .theme-toggle-btn .fa-moon {
                display: none;
            }

            [data-theme='dark'] .theme-toggle-btn .fa-sun {
                display: inline-block;
                color: #ffc107;
            }

            /* Nav Bar & Mega Menu Wrapper */
            .nav-mega-wrapper {
                position: relative;
            }

            /* Nav Bar (Horizontal Menu) */
            .nav-bar {
                border-top: 1px solid var(--border-subtle, #f0f0f0);
                height: 50px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .nav-bar::-webkit-scrollbar {
                display: none;
            }

            .navbar-nav {
                display: flex;
                flex-direction: row !important;
                list-style: none;
                padding: 0;
                margin: 0;
                gap: 5px;
            }

            .nav-link {
                display: block;
                padding: 0 20px !important;
                line-height: 50px;
                font-family: 'Paperlogy', sans-serif;
                font-weight: 400;
                font-size: 15px;
                color: var(--text-color, #445);
                text-decoration: none !important;
                transition: color 0.2s, background-color 0.2s;
                border-radius: 4px;
            }

            .nav-link:hover {
                background-color: var(--nav-hover, #f8f9fa);
                color: var(--text-color, #333);
            }

            /* Mega Menu Container */
            .mega-menu-container {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: var(--navbar-bg, #ffffff);
                border: 1px solid var(--border-color, #a7d7f9);
                border-top: none;
                box-shadow: 0 10px 25px var(--shadow, rgba(0, 0, 0, 0.1));
                border-radius: 0 0 12px 12px;
                padding: 30px;
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px);
                /* 닫힐 때 빠르게: 80ms */
                transition: opacity 0.08s ease, visibility 0.08s ease, transform 0.08s ease;
                z-index: 999;
            }

            /* Show Mega Menu when hovering over the wrapper */
            .nav-mega-wrapper:hover .mega-menu-container {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
                /* 열릴 때는 부드럽게: 200ms */
                transition: opacity 0.2s cubic-bezier(0.165, 0.84, 0.44, 1), visibility 0.2s, transform 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
            }

            .mega-menu-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 40px;
            }

            .mega-column h5 {
                font-family: 'Paperlogy', sans-serif;
                font-size: 16px;
                font-weight: 700;
                color: var(--text-color, #333);
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 2px solid var(--border-subtle, #f0f0f0);
            }

            .mega-column ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            .mega-link {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                color: var(--text-color, #555);
                text-decoration: none !important;
                font-size: 14.5px;
                border-radius: 8px;
                transition: all 0.2s;
            }

            .mega-link i {
                width: 20px;
                text-align: center;
                font-size: 16px;
                color: #889;
                transition: color 0.2s;
            }

            .mega-link:hover {
                background-color: var(--nav-hover, #f1f3f5);
                color: var(--text-color, #333);
                padding-left: 18px;
            }

            .mega-link:hover i {
                color: var(--text-color, #333);
            }

            /* --- Visitor Counter --- */
            .visitor-counter {
                font-size: 0.85rem;
                color: var(--stat-label, #777);
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--nav-hover, #f8f9fa);
                padding: 4px 12px;
                border-radius: 12px;
                margin-left: auto;
                /* Push to right in flex parent */
                border: 1px solid var(--border-subtle, #eee);
            }

            .visitor-counter i {
                color: #ff80ab;
            }

            .visitor-count-num {
                font-weight: 700;
                color: var(--text-color, #333);
            }

            /* Mobile Menu (Hidden for now as requested simple) */
            @media (max-width: 991px) {
                .mega-menu-container {
                    display: none;
                }

                .nav-link {
                    padding: 0 15px !important;
                    font-size: 14px;
                    white-space: nowrap;
                }

                .header-wrapper {
                    position: sticky;
                    top: 0;
                }

                .nav-bar {
                    justify-content: flex-start;
                }

                .navbar-nav {
                    overflow-x: auto;
                    -webkit-overflow-scrolling: touch;
                    flex-wrap: nowrap;
                    width: 100%;
                }

                .navbar-nav::-webkit-scrollbar {
                    display: none;
                }

                .visitor-counter {
                    display: none;
                    /* Hide visitor counter on small screens in the nav bar */
                }

                .brand-logo img:first-child {
                    height: 30px !important;
                }

                .brand-logo img:last-child {
                    height: 22px !important;
                }

                .top-bar {
                    height: 55px;
                }

                .brand-logo span {
                    font-size: 18px;
                }

                /* 좁은 화면: 유저명 숨기고, 동기화 토글의 "동기화" 텍스트만 숨김 */
                .header-username-label {
                    display: none;
                }

                .sync-toggle-label {
                    display: none;
                }
            }
        </style>

        <div class="header-wrapper">
            <div class="header-content-container">
                <div class="top-bar">
                    <a th:href="@{/wiki}" class="brand-logo">
                        <img src="/images/logo/header_logo.png" alt="Icon" style="height: 35px; width: auto;">
                        <img src="/images/logo/main_logo.png" alt="Logo"
                            style="height: 28px; width: auto; margin-top: 2px;">
                    </a>

                    <div class="header-actions">
                        <div sec:authorize="isAnonymous()">
                            <a th:href="@{/wiki/login}" class="btn btn-outline-primary btn-sm" style="font-family: 'Paperlogy', sans-serif; border-radius: 20px; padding: 4px 15px;">
                                로그인
                            </a>
                        </div>
                        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                            <!-- 수집도감 동기화 토글 (항상 노출) -->
                            <div class="sync-toggle-wrap d-flex align-items-center gap-1" style="font-family: 'Paperlogy', sans-serif; font-size: 12px; color: var(--text-color, #555); position: relative;">
                                <label class="form-check form-switch m-0 d-flex align-items-center" style="padding-left: 2.2em; cursor: pointer;" title="수집도감 기기 간 동기화">
                                    <input class="form-check-input" type="checkbox" id="checklistSyncToggle"
                                           th:checked="${currentUser != null and currentUser.checklistSyncEnabled}"
                                           style="cursor: pointer;">
                                    <span class="sync-toggle-label ms-1" style="white-space: nowrap;">기기간 동기화</span>
                                </label>
                                <button type="button" id="syncInfoBtn"
                                        class="btn btn-link p-0"
                                        style="color: #888; font-size: 13px; line-height: 1; border: none;">
                                    <i class="fas fa-circle-question"></i>
                                </button>
                                <!-- 클릭 시 토글되는 설명 팝업 -->
                                <div id="syncInfoPopover" style="display:none; position:absolute; top:100%; right:0; margin-top:8px; background:#fff; border:1px solid #a7d7f9; border-radius:10px; padding:14px 16px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:10000; width:280px; font-size:12px; line-height:1.55; color:#333; font-family:Paperlogy,sans-serif;">
                                    <div style="font-weight:700; margin-bottom:6px; color:#1864ab;">
                                        <i class="fas fa-cloud me-1"></i>기기간 동기화란?
                                    </div>
                                    <div style="color:#555;">
                                        <strong>켜짐:</strong> 수집 진행 상황이 계정에 저장됩니다. 다른 기기/브라우저에서 같은 계정으로 로그인하면 동일하게 보입니다.
                                    </div>
                                    <div style="color:#555; margin-top:6px;">
                                        <strong>꺼짐:</strong> 이 기기에서만 저장됩니다. 다른 기기와 분리됩니다.
                                    </div>
                                </div>
                            </div>

                            <span class="header-username-label" style="font-family: 'Paperlogy', sans-serif; font-size: 14px; color: var(--text-color, #333);">
                                <span sec:authentication="name" style="font-weight: 700;"></span>님
                            </span>
                            <form th:action="@{/wiki/logout}" method="post" class="m-0 p-0">
                                <button type="submit" class="btn btn-outline-secondary btn-sm" style="font-family: 'Paperlogy', sans-serif; border-radius: 20px; padding: 4px 10px; font-size: 12px;">
                                    로그아웃
                                </button>
                            </form>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/wiki/admin/reports}" class="btn btn-danger btn-sm" style="font-family: 'Paperlogy', sans-serif; border-radius: 20px; padding: 4px 10px; font-size: 12px;">
                                ADMIN
                            </a>
                        </div>

                        <!-- Dark Mode Toggle -->
                        <button class="theme-toggle-btn" id="themeToggle" title="테마 변경">
                            <i class="fas fa-moon"></i>
                            <i class="fas fa-sun"></i>
                        </button>
                    </div>
                </div>

                <!-- Nav Bar + Mega Menu Wrapper -->
                <div class="nav-mega-wrapper">
                    <div class="nav-bar d-flex align-items-center">
                        <ul class="navbar-nav flex-grow-1">
                            <!-- Simple Links -->
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki/codes}">쿠폰</a></li>

                            <!-- Trigger Links (Hovering these keeps menu open because they are in wrapper) -->
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">컬렉션</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">아이템들</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki}">기타</a></li>
                            <!-- 추가 링크 -->
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki/checklist}">수집 도감</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/wiki/reports}" style="color: #d81b60; font-weight: 700;">문의 게시판</a></li>
                            <!-- 지도 link removed from here as it is already above in some cases or redundant -->
                        </ul>

                        <!-- Visitor Counter (Icons only) -->
                        <div class="visitor-counter" th:if="${weeklyVisitors != null}">
                            <div class="d-flex align-items-center gap-2">
                                <div class="d-flex align-items-center gap-1" title="주간 조회수">
                                    <i class="fas fa-eye" style="color: #889;"></i>
                                    <span class="visitor-count-num"
                                        th:text="${#numbers.formatInteger(weeklyVisitors, 0, 'COMMA')}">1,234</span>
                                </div>
                                <div
                                    style="width: 1px; height: 10px; background-color: var(--border-subtle, #ddd); margin: 0 4px;">
                                </div>
                                <div class="d-flex align-items-center gap-1" title="오늘 조회수">
                                    <i class="fas fa-fire" style="color: #ff6b6b;"></i>
                                    <span class="visitor-count-num"
                                        th:text="${#numbers.formatInteger(todayVisitors, 0, 'COMMA')}">56</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Mega Dropdown (Full Width Content) -->
                    <div class="mega-menu-container">
                        <div class="mega-menu-grid">
                            <!-- Column 1: 컬렉션 -->
                            <div class="mega-column">
                                <h5>컬렉션</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/collections/fish}" class="mega-link"><i
                                                class="fas fa-fish"></i> 물고기</a></li>
                                    <li><a th:href="@{/wiki/collections/bug}" class="mega-link"><i
                                                class="fas fa-bug"></i> 벌레</a></li>
                                    <li><a th:href="@{/wiki/collections/bird}" class="mega-link"><i
                                                class="fas fa-crow"></i> 새</a></li>
                                    <li><a th:href="@{/wiki/collections/animal}" class="mega-link"><i
                                                class="fas fa-paw"></i> 동물</a></li>
                                </ul>
                            </div>

                            <!-- Column 2: 아이템들 -->
                            <div class="mega-column">
                                <h5>아이템들</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/items/cooking}" class="mega-link"><i
                                                class="fas fa-utensils"></i>
                                            요리</a></li>
                                    <li><a th:href="@{/wiki/items/crops}" class="mega-link"><i
                                                class="fas fa-carrot"></i>
                                            작물</a></li>
                                    <li><a th:href="@{/wiki/items/flowers}" class="mega-link"><i
                                                class="fas fa-seedling"></i>
                                            꽃</a></li>
                                    <li><a th:href="@{/wiki/collections/forageable}" class="mega-link"><i
                                                class="fas fa-leaf"></i> 채집물</a></li>
                                </ul>
                            </div>

                            <!-- Column 3: 기타 -->
                            <div class="mega-column">
                                <h5>기타</h5>
                                <ul>
                                    <li><a th:href="@{/wiki/others/villagers}" class="mega-link"><i
                                                class="fas fa-user-group"></i> 주민들</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 로그인 상태 플래그 (sync 플래그는 common-head.html에서 이미 설정됨) -->
        <script>window._heartopiaIsLoggedIn = false;</script>

        <th:block th:if="${currentUser != null}">
        <script>
            window._heartopiaIsLoggedIn = true;

            (function () {
                const csrf = {
                    token: document.querySelector('meta[name="_csrf"]')?.getAttribute('content'),
                    header: document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content')
                };

                // --- 쿠폰 마이그레이션 (로그인 시 1회, 성공 후 자동 종료) ---
                const localCoupons = JSON.parse(localStorage.getItem('copiedCoupons') || '[]');
                if (localCoupons.length > 0) {
                    window._couponMigration = fetch('/api/user/coupons/migrate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token },
                        body: JSON.stringify(localCoupons)
                    }).then(r => { if (r.ok) localStorage.removeItem('copiedCoupons'); })
                      .catch(() => {});
                } else {
                    window._couponMigration = Promise.resolve();
                }

                // --- 동기화 토글 + 발견성 유도 ---
                document.addEventListener('DOMContentLoaded', () => {
                    const toggle = document.getElementById('checklistSyncToggle');

                    // ? 버튼 클릭 → 설명 팝업 토글, 외부 클릭 시 닫기
                    const infoBtn = document.getElementById('syncInfoBtn');
                    const infoPopover = document.getElementById('syncInfoPopover');
                    if (infoBtn && infoPopover) {
                        infoBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            infoPopover.style.display = infoPopover.style.display === 'none' ? 'block' : 'none';
                        });
                        document.addEventListener('click', (e) => {
                            if (infoPopover.style.display === 'block' &&
                                !infoPopover.contains(e.target) &&
                                e.target !== infoBtn &&
                                !infoBtn.contains(e.target)) {
                                infoPopover.style.display = 'none';
                            }
                        });
                    }

                    // 동기화 토글 동작
                    if (toggle) {
                        let toggleInFlight = false;
                        toggle.addEventListener('change', async () => {
                            if (toggleInFlight) {
                                // 진행 중 double-click 방지 — UI 상태 원복
                                toggle.checked = !toggle.checked;
                                return;
                            }
                            const enabled = toggle.checked;
                            const localData = enabled
                                ? JSON.parse(localStorage.getItem('heartopia_checklist') || '{}')
                                : null;

                            if (enabled && Object.keys(localData || {}).length > 0) {
                                if (!confirm('현재 이 기기의 수집 데이터를 계정에 업로드합니다. 계속하시겠습니까?')) {
                                    toggle.checked = false;
                                    return;
                                }
                            }

                            toggleInFlight = true;
                            toggle.disabled = true;
                            try {
                                const res = await fetch('/api/user/checklist/sync', {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token },
                                    body: JSON.stringify({ enabled, localData })
                                });
                                if (!res.ok) throw new Error('sync toggle failed');
                                const dbData = await res.json();

                                // 토글 OFF 시: DB 데이터를 localStorage에 복사해 로컬로 전환
                                if (!enabled) {
                                    localStorage.setItem('heartopia_checklist', JSON.stringify(dbData));
                                }
                                // 토글 ON 시: localStorage 비움 (ChecklistCore가 DB에서 다시 로드)
                                else {
                                    localStorage.removeItem('heartopia_checklist');
                                }
                                window.location.reload();
                            } catch (e) {
                                alert('동기화 설정 변경에 실패했습니다.');
                                toggle.checked = !enabled;
                                toggle.disabled = false;
                                toggleInFlight = false;
                            }
                        });
                    }

                    // 로그아웃 시: 로그인 중 DB에만 있던 데이터를 localStorage로 복사
                    // (sync OFF 토글과 동일한 결과 — 로그아웃 후에도 데이터 보임)
                    const logoutForm = document.querySelector('form[action$="/wiki/logout"]');
                    if (logoutForm) {
                        let logoutInFlight = false;
                        logoutForm.addEventListener('submit', async (e) => {
                            if (logoutInFlight) return; // 중복 클릭 시 두 번째는 정상 진행
                            e.preventDefault();
                            logoutInFlight = true;
                            const tasks = [];

                            // 동기화 ON일 때만 체크리스트 복사 (sync OFF면 이미 localStorage에 있음)
                            if (window._heartopiaChecklistSyncEnabled) {
                                tasks.push(
                                    fetch('/api/user/checklist')
                                        .then(r => r.ok ? r.json() : null)
                                        .then(data => {
                                            if (data) localStorage.setItem('heartopia_checklist', JSON.stringify(data));
                                        })
                                        .catch(() => {})
                                );
                            }

                            // 쿠폰은 항상 DB가 진실이라 무조건 복사
                            tasks.push(
                                fetch('/api/user/coupons')
                                    .then(r => r.ok ? r.json() : null)
                                    .then(data => {
                                        if (data) localStorage.setItem('copiedCoupons', JSON.stringify(data));
                                    })
                                    .catch(() => {})
                            );

                            await Promise.all(tasks);
                            logoutForm.submit();
                        });
                    }

                    // 첫 로그인 토스트: sync OFF + localStorage에 데이터 있고 안내 미노출 시
                    const syncFlag = window._heartopiaChecklistSyncEnabled;
                    const hintShown = localStorage.getItem('heartopia_sync_hint_shown');
                    const localChecklist = JSON.parse(localStorage.getItem('heartopia_checklist') || '{}');
                    if (!syncFlag && !hintShown && Object.keys(localChecklist).length > 0) {
                        setTimeout(() => {
                            showSyncHintToast();
                            localStorage.setItem('heartopia_sync_hint_shown', '1');
                        }, 1500);
                    }

                    function showSyncHintToast() {
                        // slideIn keyframe을 한 번만 주입
                        if (!document.getElementById('syncHintKeyframes')) {
                            const style = document.createElement('style');
                            style.id = 'syncHintKeyframes';
                            style.textContent = '@keyframes syncHintSlideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }';
                            document.head.appendChild(style);
                        }
                        const toast = document.createElement('div');
                        toast.style.cssText = 'position:fixed;bottom:30px;right:30px;background:#fff;border:1px solid #a7d7f9;border-radius:12px;padding:16px 20px;box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:10000;max-width:320px;font-family:Paperlogy,sans-serif;font-size:13px;line-height:1.5;animation:syncHintSlideIn 0.3s ease-out;';
                        toast.innerHTML = '<div style="font-weight:700;color:#333;margin-bottom:6px;"><i class="fas fa-cloud-upload-alt" style="color:#ff7f9d;"></i> 다른 기기에서도 보고 싶으세요?</div>' +
                            '<div style="color:#666;margin-bottom:10px;">프로필 메뉴에서 "기기 간 동기화"를 켜면 이 기기의 수집 데이터가 계정에 저장됩니다.</div>' +
                            '<button style="background:none;border:none;color:#888;font-size:12px;cursor:pointer;padding:0;">닫기</button>';
                        toast.querySelector('button').addEventListener('click', () => toast.remove());
                        document.body.appendChild(toast);
                        setTimeout(() => toast.remove(), 10000);
                    }
                });
            })();
        </script>
        </th:block>

        <!-- Dark Mode Persistence Script -->
        <script>
            (function () {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
            })();

            document.addEventListener('DOMContentLoaded', () => {
                const themeToggle = document.getElementById('themeToggle');

                themeToggle.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            });
        </script>
