<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Common Head (Favicon, Fonts, Bootstrap, FontAwesome, common.css) -->
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>

    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height) - 150px);
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #ff80ab;
            line-height: 1;
            margin-bottom: 20px;
            font-family: 'Paperlogy', sans-serif;
            text-shadow: 4px 4px 0px rgba(255, 128, 171, 0.2);
        }

        .error-icon {
            font-size: 80px;
            color: #ffc107;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }

        .error-message h1 {
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .error-message p {
            font-size: 1.1rem;
            color: var(--stat-label);
            margin-bottom: 35px;
            max-width: 500px;
        }

        .btn-home {
            background-color: #ff80ab;
            color: white;
            font-family: 'Paperlogy', sans-serif;
            font-weight: 700;
            padding: 12px 35px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 128, 171, 0.3);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            background-color: #f50057;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 128, 171, 0.4);
        }

        [data-theme='dark'] .error-code {
            color: #ff4081;
            text-shadow: 4px 4px 0px rgba(255, 64, 129, 0.2);
        }

        [data-theme='dark'] .btn-home {
            background-color: #ff4081;
        }

        [data-theme='dark'] .btn-home:hover {
            background-color: #f50057;
        }
    </style>
</head>

<body>
    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="mw-body">
        <div class="error-container">
            <div class="error-icon">
                <i class="fas fa-search"></i>
            </div>
            <div class="error-code">404</div>
            <div class="error-message">
                <h1>길을 잃으셨나요?</h1>
                <p>요청하신 페이지가 존재하지 않거나, 주소가 변경되었을 수 있습니다.<br>하토피아의 다른 곳을 탐험해 보세요!</p>
            </div>
            <a th:href="@{/wiki}" class="btn-home">
                <i class="fas fa-home"></i> 홈으로 돌아가기
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-5 text-center text-muted"
            style="font-size: 0.9rem; border-top: 1px solid var(--border-subtle); padding-top: 20px;">
            <p>&copy; 2026 Heartopia Wiki Project.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
