<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <style>
        .admin-container {
            max-width: 900px;
            margin: 120px auto 50px;
            padding: 0 20px;
            min-height: 60vh;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #333;
            padding-bottom: 1rem;
        }
        .card {
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #f8f9fa;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }
        .table th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="mw-body">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="admin-container">
        <div class="admin-header">
            <h2><i class="fas fa-cog"></i> 관리자: 공지사항 관리</h2>
            <a href="/wiki" class="btn btn-outline-secondary btn-sm">메인으로</a>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-plus-circle text-primary"></i> 새 소식 등록
            </div>
            <div class="card-body">
                <form action="/wiki/admin/notices/add" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="mb-3">
                        <label class="form-label">제목</label>
                        <input type="text" name="title" class="form-control" required placeholder="예: 스카니아@환산 루시드로 변신 시 환산이 떨어져 출력됩니다.">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">내용</label>
                        <textarea name="content" class="form-control" rows="3" required placeholder="공지 상세 내용을 적어주세요."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">공지사항 등록하기</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fas fa-list text-success"></i> 등록된 공지사항 목록
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>제목</th>
                                <th>상태</th>
                                <th>작성일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="n : ${notices}">
                                <td th:text="${n.id}">1</td>
                                <td th:text="${n.title}">제목</td>
                                <td>
                                    <span th:if="${n.isActive}" class="badge bg-success">활성</span>
                                    <span th:unless="${n.isActive}" class="badge bg-secondary">숨김</span>
                                </td>
                                <td th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</td>
                                <td>
                                    <form action="/wiki/admin/notices/toggle" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="id" th:value="${n.id}">
                                        <input type="hidden" name="isActive" th:value="${!n.isActive}">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary" th:text="${n.isActive ? '숨기기' : '노출하기'}">토글</button>
                                    </form>
                                    <form action="/wiki/admin/notices/delete" method="post" style="display:inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="id" th:value="${n.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(notices)}">
                                <td colspan="5" class="text-center py-4 text-muted">등록된 공지사항이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
