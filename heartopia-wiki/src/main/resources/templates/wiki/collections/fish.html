<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js" defer></script>
</head>

<body>
    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="mw-body">
        <div class="page-header"><i class="fas fa-fish fa-2x text-primary"></i>
            <h1>물고기 도감 (Fish Collection)
                <span sec:authorize="hasRole('ADMIN')">
                    <button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addFishModal" style="font-size: 0.5em; vertical-align: middle;">
                        <i class="fas fa-plus me-1"></i> 물고기 추가
                    </button>
                </span>
            </h1>
        </div>
        <p class="text-secondary mb-4">하트피아의 강과 바다에서 낚을 수 있는 다양한 물고기들에 대한 정보입니다.</p>
        <!-- Filter Bar -->
        <div class="filter-bar">
            <!-- Search -->
            <div class="filter-group" style="flex-grow: 2;">
                <i class="fas fa-search text-secondary"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="이름 검색...">
            </div>
            <!-- Event Button -->
            <button type="button" id="btn-dream-event" class="btn btn-outline-dark rounded-pill px-3 shadow-sm d-flex align-items-center gap-2" style="border-width: 2px; font-weight: bold; white-space: nowrap;">
                <i class="fas fa-moon text-warning"></i> 꿈의 명암만 보기
            </button>

            <!-- Hidden Event Filter -->
            <select id="eventFilter" class="filter-select" style="display: none;">
                <option value="all">모든 이벤트</option>
                <option value="꿈의 명암">꿈의 명암</option>
            </select>
            <select id="levelFilter" class="filter-select">
                <option value="all">모든 레벨</option>
                <option value="1">Lv.1</option>
                <option value="2">Lv.2</option>
                <option value="3">Lv.3</option>
                <option value="4">Lv.4</option>
                <option value="5">Lv.5</option>
                <option value="6">Lv.6</option>
                <option value="7">Lv.7</option>
                <option value="8">Lv.8</option>
                <option value="9">Lv.9</option>
                <option value="10">Lv.10+</option>
            </select>
            <select id="locationFilter" class="filter-select">
                <option value="all">모든 장소</option>
                <!-- Options populated by JS -->
            </select>
            <select id="shadowFilter" class="filter-select">
                <option value="all">모든 그림자</option>
                <!-- Options populated by JS -->
            </select>

            <!-- Sort & Reset (Fragment) -->
            <div th:replace="~{fragments/wiki-components :: sortAndReset}"></div>
        </div>
        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults"><i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <!-- Fish Card Loop -->
            <div th:each="fish : ${fishList}" class="wiki-item-card" th:data-name="${fish.name}"
                th:data-level="${#strings.replace(fish.level, 'Lv.', '')}" th:data-location="${fish.location}"
                th:data-shadow="${fish.size}" th:data-price="${fish.prices[0]}"
                th:data-event="${fish.eventName != null ? fish.eventName : ''}">

                <div class="wiki-item-image">
                    <img th:if="${fish.imageUrl != null}" th:src="${fish.imageUrl}" th:alt="${fish.name}"
                        style="max-height: 100px; object-fit: contain;">
                    <i th:class="'fas fa-fish fa-4x text-primary fallback-icon'"
                        th:style="${fish.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                </div>

                <div class="wiki-item-info">
                    <a th:href="@{/wiki/collections/fish/{name}(name=${fish.name})}" class="wiki-item-name">
                        <span th:text="${fish.name}">생선 이름</span>
                        <span th:if="${fish.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${fish.eventName}"></span>
                    </a>
                    <div>
                        <a th:href="@{/wiki/map(cat='fish', name=${fish.name})}" class="wiki-item-tag location-link">
                            <i class="fas fa-map-marker-alt me-1"></i>
                            <span th:text="${fish.location + ' - ' + fish.subLocation}">서식지</span>
                        </a>
                    </div>
                </div>

                <table class="wiki-item-stats">
                    <tr>
                        <td class="stat-label">요구 레벨</td>
                        <td class="stat-value"><span th:text="${fish.level}"></span> Lv</td>
                    </tr>
                    <tr>
                        <td class="stat-label">날씨</td>
                        <td class="stat-value">
                            <span th:if="${fish.weather.contains('해')}" title="맑음"><i
                                    class="fas fa-sun text-warning me-1"></i></span>
                            <span th:if="${fish.weather.contains('비')}" title="비"><i
                                    class="fas fa-cloud-showers-heavy text-primary me-1"></i></span>
                            <span th:if="${fish.weather.contains('무지개')}" title="무지개"><i
                                    class="fas fa-rainbow text-info me-1"></i></span>
                            <span th:if="${fish.weather == '상시'}" th:text="${fish.weather}"></span>
                            <small class="text-muted" th:if="${fish.weather != '상시'}" th:text="${fish.weather}"></small>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">시간</td>
                        <td class="stat-value" th:text="${fish.time}">상시</td>
                    </tr>
                    <tr>
                        <td class="stat-label">사이즈</td>
                        <td class="stat-value" th:text="${fish.size}">중형</td>
                    </tr>
                </table>

                <!-- Price Fragment -->
                <div th:replace="~{fragments/wiki-components :: priceDisplay(${fish.prices})}"></div>
                <!-- 관리자: 수정/삭제 버튼 -->
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addFishModal" data-edit-title="물고기 수정"
                        th:data-item="${'{&quot;id&quot;:' + fish.id + ',&quot;name&quot;:&quot;' + fish.name + '&quot;,&quot;level&quot;:' + fish.level + ',&quot;location&quot;:&quot;' + fish.location + '&quot;,&quot;subLocation&quot;:&quot;' + (fish.subLocation != null ? fish.subLocation : '') + '&quot;,&quot;weather&quot;:&quot;' + (fish.weather != null ? fish.weather : '') + '&quot;,&quot;time&quot;:&quot;' + (fish.time != null ? fish.time : '') + '&quot;,&quot;price1&quot;:' + (fish.price1 != null ? fish.price1 : 'null') + ',&quot;price2&quot;:' + (fish.price2 != null ? fish.price2 : 'null') + ',&quot;price3&quot;:' + (fish.price3 != null ? fish.price3 : 'null') + ',&quot;price4&quot;:' + (fish.price4 != null ? fish.price4 : 'null') + ',&quot;price5&quot;:' + (fish.price5 != null ? fish.price5 : 'null') + ',&quot;size&quot;:&quot;' + (fish.size != null ? fish.size : '') + '&quot;,&quot;imageUrl&quot;:&quot;' + (fish.imageUrl != null ? fish.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (fish.eventName != null ? fish.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete"
                        th:data-name="${fish.name}" th:data-delete-url="${'/wiki/admin/data/fish/delete/' + fish.id}">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="wiki-table-container" id="wikiTable">
            <table class="wiki-table-layout">
                <thead>
                    <tr>
                        <th></th>
                        <th>이름</th>
                        <th>레벨</th>
                        <th>장소</th>
                        <th>날씨</th>
                        <th>시간</th>
                        <th>사이즈</th>
                        <th>판매가(1★)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fish : ${fishList}" class="wiki-table-row"
                        th:data-name="${fish.name}"
                        th:data-level="${#strings.replace(fish.level, 'Lv.', '')}"
                        th:data-location="${fish.location}"
                        th:data-shadow="${fish.size}"
                        th:data-price="${fish.prices[0]}"
                        th:data-event="${fish.eventName != null ? fish.eventName : ''}">
                        <td>
                            <img th:if="${fish.imageUrl != null}" th:src="${fish.imageUrl}" th:alt="${fish.name}" class="table-thumb">
                            <div th:unless="${fish.imageUrl != null}" class="table-thumb-placeholder"><i class="fas fa-fish"></i></div>
                        </td>
                        <td>
                            <a th:href="@{/wiki/collections/fish/{name}(name=${fish.name})}" class="table-name-link">
                                <span th:text="${fish.name}">이름</span>
                                <span th:if="${fish.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.7em;" th:text="${fish.eventName}"></span>
                            </a>
                        </td>
                        <td th:text="${fish.level}">1</td>
                        <td>
                            <a th:href="@{/wiki/map(cat='fish', name=${fish.name})}" class="table-location-link">
                                <i class="fas fa-map-marker-alt me-1"></i>
                                <span th:text="${fish.location + ' - ' + fish.subLocation}">장소</span>
                            </a>
                        </td>
                        <td th:text="${fish.weather}">상시</td>
                        <td th:text="${fish.time}">상시</td>
                        <td th:text="${fish.size}">중형</td>
                        <td class="table-price" th:text="${fish.prices[0]}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 관리자 전용: 물고기 추가/수정 모달 -->
        <div sec:authorize="hasRole('ADMIN')">
            <div class="modal fade" id="addFishModal" tabindex="-1" data-add-title="새 물고기 추가">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
                        <div class="modal-header" style="background:linear-gradient(135deg,#4D342E,#795548);color:#fff;border-radius:20px 20px 0 0;padding:20px 24px;">
                            <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 물고기 추가</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button>
                        </div>
                        <form action="/wiki/admin/data/fish/add" method="post" data-add-action="/wiki/admin/data/fish/add" data-update-action="/wiki/admin/data/fish/update" data-img-base="/images/fish/">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="id" value="" />
                            <div class="modal-body" style="padding:24px;">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-bold">이름 *</label><input type="text" name="name" class="form-control" required></div>
                                    <div class="col-md-3"><label class="form-label fw-bold">레벨 *</label><input type="number" name="level" class="form-control" required></div>
                                    <div class="col-md-3"><label class="form-label fw-bold">사이즈</label><input type="text" name="size" class="form-control" placeholder="중형"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">장소 *</label><input type="text" name="location" class="form-control" required></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">세부 장소</label><input type="text" name="subLocation" class="form-control"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">날씨</label><input type="text" name="weather" class="form-control" placeholder="상시"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">시간</label><input type="text" name="time" class="form-control" placeholder="상시"></div>
                                    <div class="col-12"><label class="form-label fw-bold">판매가 (1★~5★)</label>
                                        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
                                            <input type="number" name="price1" class="form-control" placeholder="1★">
                                            <input type="number" name="price2" class="form-control" placeholder="2★">
                                            <input type="number" name="price3" class="form-control" placeholder="3★">
                                            <input type="number" name="price4" class="form-control" placeholder="4★">
                                            <input type="number" name="price5" class="form-control" placeholder="5★">
                                        </div>
                                    </div>
                                    <div class="col-md-8"><label class="form-label fw-bold">이미지</label>
                                        <div class="input-group"><span class="input-group-text" style="font-size:0.85rem;">/images/fish/</span><input type="text" class="form-control img-filename" placeholder="파일명.png"></div>
                                        <input type="hidden" name="imageUrl" />
                                    </div>
                                    <div class="col-md-4"><label class="form-label fw-bold">이벤트</label><input type="text" name="eventName" class="form-control"></div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                                <button type="submit" class="btn btn-admin-submit text-white" style="background:linear-gradient(135deg,#4D342E,#795548);">추가하기</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer (Common Fragment) -->
        <div th:replace="~{fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
            const btnDream = document.getElementById('btn-dream-event');
            const eventFilter = document.getElementById('eventFilter');
            let isDreamOnly = false;

            if (btnDream && eventFilter) {
                btnDream.addEventListener('click', function() {
                    isDreamOnly = !isDreamOnly;
                    if(isDreamOnly) {
                        eventFilter.value = '꿈의 명암';
                        btnDream.classList.remove('btn-outline-dark');
                        btnDream.classList.add('btn-dark');
                    } else {
                        eventFilter.value = 'all';
                        btnDream.classList.remove('btn-dark');
                        btnDream.classList.add('btn-outline-dark');
                    }
                    eventFilter.dispatchEvent(new Event('change'));
                });
            }

            new WikiFilter({
                    gridId: 'wikiGrid',
                    tableId: 'wikiTable',
                    itemSelector: '.wiki-item-card',
                    filters: [
                        { id: 'eventFilter', dataKey: 'event', autoPopulate: true },
                        { id: 'levelFilter', dataKey: 'level' },
                        { id: 'locationFilter', dataKey: 'location', autoPopulate: true },
                        { id: 'shadowFilter', dataKey: 'shadow', autoPopulate: true }
                    ]
                });
            });
        </script>
    <script src="/js/admin-data.js" defer></script>
</body>

</html>
