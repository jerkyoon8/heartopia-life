<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js" defer></script>
    <style>
        :root {
            --content-bg: var(--content-bg, rgba(251, 251, 251, 0.95));
            --accent-color: #FF8A65;
        }

        .fish-image-wrapper {
            width: 100%;
            height: 150px;
            background: var(--nav-hover, #fff3e0);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fish-image-wrapper img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .fish-habitat {
            display: inline-block;
            background: var(--nav-hover);
            color: #e64a19;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .fish-stats {
            width: 100%;
            font-size: 0.9rem;
            border-collapse: collapse;
        }

        .fish-stats td {
            padding: 8px 0;
            border-bottom: 1px solid var(--border-subtle, #f0f0f0);
        }

        .stat-label {
            color: var(--stat-label, #777);
            width: 120px;
        }

        .stat-value {
            color: var(--stat-value, #333);
            font-weight: 600;
            text-align: right;
        }
    </style>
</head>

<body>
    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="mw-body">
        <div class="page-header"><i class="fas fa-paw fa-2x text-warning"></i>
            <h1>야생 동물 도감 (Wild Animal Collection)
                <span sec:authorize="hasRole('ADMIN')"><button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addAnimalModal" style="font-size:0.5em;vertical-align:middle;"><i class="fas fa-plus me-1"></i>동물 추가</button></span>
            </h1>
        </div>
        
        <div class="filter-bar border-0 shadow-none pb-0">
            <!-- Event Button -->
            <button type="button" id="btn-dream-event" class="btn btn-outline-dark rounded-pill px-3 shadow-sm d-flex align-items-center gap-2" style="border-width: 2px; font-weight: bold; white-space: nowrap; margin-left: auto;">
                <i class="fas fa-moon text-warning"></i> 꿈의 명암만 보기
            </button>
            <select id="eventFilter" class="filter-select" style="display: none;">
                <option value="all">모든 이벤트</option>
                <option value="꿈의 명암">꿈의 명암</option>
            </select>
        </div>

        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults">
                <i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <div th:each="animal : ${animalList}" class="wiki-item-card"
                 th:data-event="${animal.eventName != null ? animal.eventName : ''}">
                <div class="fish-image-wrapper">
                    <img th:if="${animal.imageUrl != null}" th:src="${animal.imageUrl}" th:alt="${animal.name}"
                        style="width: 120px; height: 120px; object-fit: contain;">
                    <i th:class="'fas fa-paw fa-4x text-warning fallback-icon'"
                        th:style="${animal.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                </div>
                <div class="text-center">
                    <a th:href="@{/wiki/collections/animal/{name}(name=${animal.name})}" class="wiki-item-name h5 mb-2">
                        <span th:text="${animal.name}"></span>
                        <span th:if="${animal.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${animal.eventName}"></span>
                    </a>
                    <a th:href="@{/wiki/map(cat='animal', name=${animal.name})}" class="wiki-item-tag location-link">
                        <i class="fas fa-map-marker-alt me-1"></i>
                        <span th:text="${animal.location}"></span>
                    </a>
                    <p class="text-muted small" th:text="${animal.description}"></p>
                </div>
                <table class="fish-stats">
                    <tr>
                        <td class="stat-label"><i class="fas fa-utensils me-2"></i>선호 음식</td>
                        <td class="stat-value text-danger" th:text="${animal.favoriteFood}"></td>
                    </tr>
                    <tr>
                        <td class="stat-label"><i class="fas fa-cloud-sun me-2"></i>좋아하는 날씨</td>
                        <td class="stat-value">
                            <span th:if="${animal.favoriteWeather.contains('맑')}" title="맑음"><i
                                    class="fas fa-sun text-warning me-1"></i></span>
                            <span th:if="${animal.favoriteWeather.contains('비')}" title="비"><i
                                    class="fas fa-cloud-showers-heavy text-primary me-1"></i></span>
                            <span th:if="${animal.favoriteWeather.contains('무지개')}" title="무지개"><i
                                    class="fas fa-rainbow text-info me-1"></i></span>
                            <small class="text-muted" th:text="${animal.favoriteWeather}"></small>
                        </td>
                    </tr>
                </table>
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addAnimalModal" data-edit-title="동물 수정"
                        th:data-item="${'{&quot;id&quot;:' + animal.id + ',&quot;name&quot;:&quot;' + animal.name + '&quot;,&quot;location&quot;:&quot;' + animal.location + '&quot;,&quot;description&quot;:&quot;' + (animal.description != null ? animal.description : '') + '&quot;,&quot;favoriteFood&quot;:&quot;' + (animal.favoriteFood != null ? animal.favoriteFood : '') + '&quot;,&quot;favoriteWeather&quot;:&quot;' + (animal.favoriteWeather != null ? animal.favoriteWeather : '') + '&quot;,&quot;imageUrl&quot;:&quot;' + (animal.imageUrl != null ? animal.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (animal.eventName != null ? animal.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i></button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete" th:data-name="${animal.name}" th:data-delete-url="${'/wiki/admin/data/animal/delete/' + animal.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const btnDream = document.getElementById('btn-dream-event');
            const eventFilter = document.getElementById('eventFilter');
            let isDreamOnly = false;

            if (btnDream && eventFilter) {
                btnDream.addEventListener('click', function() {
                    isDreamOnly = !isDreamOnly;
                    if(isDreamOnly) {
                        eventFilter.value = '꿈의 명암';
                        btnDream.classList.remove('btn-outline-dark');
                        btnDream.classList.add('btn-dark');
                    } else {
                        eventFilter.value = 'all';
                        btnDream.classList.remove('btn-dark');
                        btnDream.classList.add('btn-outline-dark');
                    }
                    eventFilter.dispatchEvent(new Event('change'));
                });
            }

            // Note: animal.html doesn't have table view, only grid view
            new WikiFilter({
                gridId: 'wikiGrid',
                itemSelector: '.wiki-item-card',
                filters: [
                    { id: 'eventFilter', dataKey: 'event', autoPopulate: true }
                ]
            });
        });
    </script>
    
    <!-- 관리자 전용: 동물 추가 모달 -->
    <div sec:authorize="hasRole('ADMIN')">
        <div class="modal fade" id="addAnimalModal" tabindex="-1" data-add-title="새 동물 추가"><div class="modal-dialog"><div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div class="modal-header" style="background:var(--modal-header-bg);color:var(--modal-header-text);border-radius:20px 20px 0 0;padding:20px 24px;"><h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 동물 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button></div>
            <form action="/wiki/admin/data/animal/add" method="post" enctype="multipart/form-data" data-add-action="/wiki/admin/data/animal/add" data-update-action="/wiki/admin/data/animal/update"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><input type="hidden" name="id" value="" />
                <div class="modal-body" style="padding:24px;"><div class="row g-3">
                    <div class="col-12"><label class="form-label fw-bold">이름 *</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">장소 *</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">좋아하는 음식</label><input type="text" name="favoriteFood" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">좋아하는 날씨</label><input type="text" name="favoriteWeather" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">이미지</label><div class="img-upload-wrapper"><input type="file" name="imageFile" class="form-control img-file-input" accept="image/*"><input type="hidden" name="existingImageUrl" /><div class="img-preview mt-2" style="display:none;"><img src="" alt="미리보기" style="max-height:80px;object-fit:contain;border-radius:8px;"></div></div></div>
                    <div class="col-12"><label class="form-label fw-bold">설명</label><textarea name="description" class="form-control" rows="2"></textarea></div>
                    <div class="col-md-6"><label class="form-label fw-bold">이벤트</label><input type="text" name="eventName" class="form-control"></div>
                </div></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button><button type="submit" class="btn btn-admin-submit text-white" style="background:var(--modal-header-bg);">추가하기</button></div>
            </form>
        </div></div></div>
    </div>

    <script src="/js/admin-data.js" defer></script>

    <!-- Footer (Common Fragment) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
