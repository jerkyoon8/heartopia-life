<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js?v=1.6" defer></script>
    <script src="/js/admin-data.js" defer></script>
</head>

<body>
    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="mw-body">
        <div class="page-header"><i class="fas fa-dove fa-2x text-info"></i>
            <h1>새 도감 (Bird Collection)
                <span sec:authorize="hasRole('ADMIN')"><button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addBirdModal" style="font-size:0.5em;vertical-align:middle;"><i class="fas fa-plus me-1"></i>새 추가</button></span>
            </h1>
        </div>
        <!-- Filter Bar (Redesign) -->
        <div class="wiki-filter-container">
            <div class="filter-top-tier">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="새 이름 검색...">
                </div>
                
                <!-- 꿈의 명암 스위치 -->
                <div class="toggle-switch-wrapper" style="box-shadow: none; border-color: transparent; background: transparent; padding: 0;">
                    <label class="toggle-switch-label">
                        <label class="switch">
                            <input type="checkbox" id="btn-dream-event">
                            <span class="slider"></span>
                        </label>
                        <i class="fas fa-moon text-warning"></i> 꿈의 명암만 표시
                    </label>
                </div>
                
                <!-- 수집된 항목 숨기기 스위치 -->
                <div class="toggle-switch-wrapper" style="box-shadow: none; border-color: transparent; background: transparent; padding: 0;">
                    <label class="toggle-switch-label">
                        <label class="switch">
                            <input type="checkbox" id="btn-hide-collected">
                            <span class="slider"></span>
                        </label>
                        <i class="fas fa-eye-slash text-secondary"></i> 수집된 항목 숨기기
                    </label>
                </div>
                
                <select id="eventFilter" style="display: none;">
                    <option value="all">모든 이벤트</option>
                    <option value="꿈의 명암">꿈의 명암</option>
                </select>

                <button type="button" class="btn-filter-toggle" onclick="document.getElementById('advancedFilters').classList.toggle('show')">
                    <i class="fas fa-sliders-h"></i> 상세 옵션 <i class="fas fa-chevron-down ms-1"></i>
                </button>
                
                <button type="button" id="resetBtn" class="btn-reset-icon" title="초기화">
                    <i class="fas fa-undo"></i>
                </button>
            </div>
            
            <div class="filter-advanced-tier" id="advancedFilters">
                
                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-filter"></i> 조건 검색</div>
                    <div class="advanced-controls-box">
                        <div class="filter-select-wrapper">
                            <span class="prefix">레벨</span>
                            <select id="levelFilter">
                                <option value="all">모든 레벨</option>
                                <option value="1">Lv.1</option>
                                <option value="2">Lv.2</option>
                                <option value="3">Lv.3</option>
                                <option value="4">Lv.4</option>
                                <option value="5">Lv.5</option>
                                <option value="6">Lv.6</option>
                                <option value="7">Lv.7</option>
                                <option value="8">Lv.8</option>
                                <option value="9">Lv.9</option>
                                <option value="10">Lv.10+</option>
                            </select>
                        </div>

                        <div class="filter-select-wrapper">
                            <span class="prefix">종류</span>
                            <select id="typeFilter">
                                <option value="all">모든 종류</option>
                                <option value="소형">소형</option>
                                <option value="비둘기">비둘기</option>
                                <option value="앵무">앵무</option>
                                <option value="오리">오리</option>
                                <option value="홍학">홍학</option>
                                <option value="갈매기">갈매기</option>
                                <option value="가마우지">가마우지</option>
                                <option value="매">매/부엉이</option>
                                <option value="중형">중형</option>
                            </select>
                        </div>

                        <div class="filter-select-wrapper">
                            <span class="prefix">장소</span>
                            <select id="locationFilter">
                                <option value="all">모든 장소</option>
                                <!-- Options populated by JS -->
                            </select>
                        </div>
                        
                        <div class="filter-select-wrapper">
                            <span class="prefix">날씨</span>
                            <select id="weatherFilter">
                                <option value="all">모든 날씨</option>
                                <option value="상시">상시</option>
                                <option value="해">☀️ 맑음</option>
                                <option value="비">🌧️ 비</option>
                                <option value="무지개">🌈 무지개</option>
                                <option value="only-무지개">🌈 무지개만 출력</option>
                            </select>
                        </div>
                        
                        <div class="filter-select-wrapper" style="padding-right: 8px;">
                            <span class="prefix">시간</span>
                            <div style="display:flex; align-items:center; gap: 4px;">
                                <select id="timeStartFilter" class="form-control form-control-sm" style="border:none; outline:none; background:transparent; padding:0 4px; font-weight: 500; font-family: inherit; width: 55px;">
                                    <option value="" selected>시작</option>
                                    <option value="00:00">00시</option>
                                    <option value="06:00">06시</option>
                                    <option value="12:00">12시</option>
                                    <option value="18:00">18시</option>
                                </select>
                                <span style="color:var(--text-color); font-weight:bold; opacity: 0.5;">~</span>
                                <select id="timeEndFilter" class="form-control form-control-sm" style="border:none; outline:none; background:transparent; padding:0 4px; font-weight: 500; font-family: inherit; width: 55px;">
                                    <option value="" selected>종료</option>
                                    <option value="06:00">06시</option>
                                    <option value="12:00">12시</option>
                                    <option value="18:00">18시</option>
                                    <option value="24:00">24시</option>
                                </select>
                                <label style="display:flex; align-items:center; gap: 4px; font-size: 0.8rem; margin-left: 6px; cursor: pointer;">
                                    <input type="checkbox" id="btn-include-always" checked style="accent-color: var(--link-color); width: 14px; height: 14px; cursor: pointer;">
                                    <span style="white-space: nowrap;">상시 포함</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="advanced-divider"></div>

                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-sort-amount-down"></i> 결과 정렬 및 보기</div>
                    <div class="advanced-controls-box">
                        <div th:replace="~{fragments/wiki-components :: sortAndReset}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults">
                <i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <div th:each="bird : ${birdList}" class="wiki-item-card sync-item" th:data-sync-key="'bird_' + ${bird.name}" th:data-name="${bird.name}"
                th:data-level="${#strings.replace(bird.level, 'Lv.', '')}" th:data-price="${bird.prices[0]}"
                th:data-type="${bird.type}" th:data-weather="${bird.weather}" th:data-time="${bird.time}" th:data-location="${bird.location}"
                th:data-event="${bird.eventName != null ? bird.eventName : ''}">

                <div class="wiki-item-image sync-container">
                    <div class="sync-check-btn" title="수집 처리 (0별)"><i class="fas fa-check"></i></div>
                    <img th:if="${bird.imageUrl != null}" th:src="${bird.imageUrl}" th:alt="${bird.name}"
                        style="max-height: 100px; object-fit: contain;">
                    <i th:class="'fas fa-dove fa-4x text-info fallback-icon'"
                        th:style="${bird.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                </div>

                <div class="wiki-item-info">
                    <div class="d-flex align-items-center justify-content-center gap-2 mb-0">
                        <span class="wiki-item-tag mb-0" th:text="${bird.type}">종류</span>
                        <a th:href="@{/wiki/collections/bird/{name}(name=${bird.name})}" class="wiki-item-name mb-0">
                            <span th:text="${bird.name}"></span>
                            <span th:if="${bird.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${bird.eventName}"></span>
                        </a>
                    </div>
                    <div class="sync-stars">
                        <i class="fas fa-star sync-star-icon" data-val="1"></i>
                        <i class="fas fa-star sync-star-icon" data-val="2"></i>
                        <i class="fas fa-star sync-star-icon" data-val="3"></i>
                        <i class="fas fa-star sync-star-icon" data-val="4"></i>
                        <i class="fas fa-star sync-star-icon" data-val="5"></i>
                    </div>
                    <div>
                        <a th:href="@{/wiki/map(cat='bird', name=${bird.name})}" class="wiki-item-tag location-link">
                            <i class="fas fa-map-marker-alt me-1"></i>
                            <span th:text="${bird.location + ' - ' + bird.subLocation}">서식지</span>
                        </a>
                    </div>
                </div>

                <table class="wiki-item-stats">
                    <tr>
                        <td class="stat-label">요구 레벨</td>
                        <td class="stat-value"><span th:text="${bird.level}"></span> Lv</td>
                    </tr>
                    <tr>
                        <td class="stat-label">날씨</td>
                        <td class="stat-value text-end">
                            <span th:if="${bird.weather.contains('해')}" title="맑음"><i
                                    class="fas fa-sun text-warning me-1"></i></span>
                            <span th:if="${bird.weather.contains('비')}" title="비"><i
                                    class="fas fa-cloud-showers-heavy text-primary me-1"></i></span>
                            <span th:if="${bird.weather.contains('무지개')}" title="무지개"><i
                                    class="fas fa-rainbow text-info me-1"></i></span>
                            <span th:if="${bird.weather == '상시'}" th:text="${bird.weather}"></span>
                            <small class="text-muted" th:if="${bird.weather != '상시'}" th:text="${bird.weather}"></small>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">시간</td>
                        <td class="stat-value" th:text="${bird.time}"></td>
                    </tr>
                </table>

                <!-- Price Fragment -->
                <div th:replace="~{fragments/wiki-components :: priceDisplay(${bird.prices})}"></div>
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addBirdModal" data-edit-title="새 수정"
                        th:data-item="${'{&quot;id&quot;:' + bird.id + ',&quot;name&quot;:&quot;' + bird.name + '&quot;,&quot;level&quot;:' + bird.level + ',&quot;location&quot;:&quot;' + bird.location + '&quot;,&quot;subLocation&quot;:&quot;' + (bird.subLocation != null ? bird.subLocation : '') + '&quot;,&quot;weather&quot;:&quot;' + (bird.weather != null ? bird.weather : '') + '&quot;,&quot;time&quot;:&quot;' + (bird.time != null ? bird.time : '') + '&quot;,&quot;type&quot;:&quot;' + (bird.type != null ? bird.type : '') + '&quot;,&quot;price1&quot;:' + (bird.price1 != null ? bird.price1 : 'null') + ',&quot;price2&quot;:' + (bird.price2 != null ? bird.price2 : 'null') + ',&quot;price3&quot;:' + (bird.price3 != null ? bird.price3 : 'null') + ',&quot;price4&quot;:' + (bird.price4 != null ? bird.price4 : 'null') + ',&quot;price5&quot;:' + (bird.price5 != null ? bird.price5 : 'null') + ',&quot;imageUrl&quot;:&quot;' + (bird.imageUrl != null ? bird.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (bird.eventName != null ? bird.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i></button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete" th:data-name="${bird.name}" th:data-delete-url="${'/wiki/admin/data/bird/delete/' + bird.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="wiki-table-container" id="wikiTable">
            <table class="wiki-table-layout">
                <thead>
                    <tr>
                        <th></th>
                        <th>이름</th>
                        <th>종류</th>
                        <th>레벨</th>
                        <th>장소</th>
                        <th>날씨</th>
                        <th>시간</th>
                        <th>판매가(1★)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="bird : ${birdList}" class="wiki-table-row"
                        th:data-name="${bird.name}"
                        th:data-level="${#strings.replace(bird.level, 'Lv.', '')}"
                        th:data-price="${bird.prices[0]}"
                        th:data-type="${bird.type}"
                        th:data-weather="${bird.weather}"
                        th:data-event="${bird.eventName != null ? bird.eventName : ''}">
                        <td>
                            <img th:if="${bird.imageUrl != null}" th:src="${bird.imageUrl}" th:alt="${bird.name}" class="table-thumb">
                            <div th:unless="${bird.imageUrl != null}" class="table-thumb-placeholder"><i class="fas fa-dove"></i></div>
                        </td>
                        <td>
                            <a th:href="@{/wiki/collections/bird/{name}(name=${bird.name})}" class="table-name-link">
                                <span th:text="${bird.name}">이름</span>
                                <span th:if="${bird.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.7em;" th:text="${bird.eventName}"></span>
                            </a>
                        </td>
                        <td><span class="wiki-item-tag mb-0" th:text="${bird.type}" style="font-size:0.8rem; padding:2px 8px;">종류</span></td>
                        <td th:text="${bird.level}">1</td>
                        <td>
                            <a th:href="@{/wiki/map(cat='bird', name=${bird.name})}" class="table-location-link">
                                <i class="fas fa-map-marker-alt me-1"></i>
                                <span th:text="${bird.location + ' - ' + bird.subLocation}">장소</span>
                            </a>
                        </td>
                        <td th:text="${bird.weather}">상시</td>
                        <td th:text="${bird.time}">상시</td>
                        <td class="table-price" th:text="${bird.prices[0]}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const btnDream = document.getElementById('btn-dream-event');
            const eventFilter = document.getElementById('eventFilter');

            if (btnDream && eventFilter) {
                btnDream.addEventListener('change', function() {
                    if(this.checked) {
                        eventFilter.value = '꿈의 명암';
                    } else {
                        eventFilter.value = 'all';
                    }
                    eventFilter.dispatchEvent(new Event('change'));
                });
                
                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => {
                        btnDream.checked = false;
                    });
                }
            }

            new WikiFilter({
                gridId: 'wikiGrid',
                tableId: 'wikiTable',
                itemSelector: '.wiki-item-card',
                filters: [
                    { id: 'eventFilter', dataKey: 'event', autoPopulate: true },
                    { id: 'levelFilter', dataKey: 'level' },
                    { id: 'typeFilter', dataKey: 'type' },
                    { id: 'locationFilter', dataKey: 'location', autoPopulate: true },
                    { id: 'weatherFilter', dataKey: 'weather' },
                    { id: 'timeFilter', dataKey: 'time', autoPopulate: true }
                ]
            });
        });
    </script>

    <!-- 관리자 전용: 새 추가 모달 -->
    <div sec:authorize="hasRole('ADMIN')">
        <div class="modal fade" id="addBirdModal" tabindex="-1" data-add-title="새 추가"><div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div class="modal-header" style="background:var(--modal-header-bg);color:var(--modal-header-text);border-radius:20px 20px 0 0;padding:20px 24px;"><h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button></div>
            <form action="/wiki/admin/data/bird/add" method="post" enctype="multipart/form-data" data-add-action="/wiki/admin/data/bird/add" data-update-action="/wiki/admin/data/bird/update"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><input type="hidden" name="id" value="" />
                <div class="modal-body" style="padding:24px;"><div class="row g-3">
                    <div class="col-md-6"><label class="form-label fw-bold">이름 *</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label fw-bold">레벨 *</label><input type="number" name="level" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label fw-bold">종류(type)</label><input type="text" name="type" class="form-control" placeholder="소형"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">장소 *</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label fw-bold">세부 장소</label><input type="text" name="subLocation" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">날씨</label><input type="text" name="weather" class="form-control" placeholder="상시"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">시간</label><input type="text" name="time" class="form-control" placeholder="상시"></div>
                    <div class="col-12"><label class="form-label fw-bold">판매가 (1★~5★)</label><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"><input type="number" name="price1" class="form-control" placeholder="1★"><input type="number" name="price2" class="form-control" placeholder="2★"><input type="number" name="price3" class="form-control" placeholder="3★"><input type="number" name="price4" class="form-control" placeholder="4★"><input type="number" name="price5" class="form-control" placeholder="5★"></div></div>
                    <div class="col-md-8"><label class="form-label fw-bold">이미지</label><div class="img-upload-wrapper"><input type="file" name="imageFile" class="form-control img-file-input" accept="image/*"><input type="hidden" name="existingImageUrl" /><div class="img-preview mt-2" style="display:none;"><img src="" alt="미리보기" style="max-height:80px;object-fit:contain;border-radius:8px;"></div></div></div>
                    <div class="col-md-4"><label class="form-label fw-bold">이벤트</label><input type="text" name="eventName" class="form-control"></div>
                </div></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button><button type="submit" class="btn btn-admin-submit text-white" style="background:var(--modal-header-bg);">추가하기</button></div>
            </form>
        </div></div></div>
    </div>

    <!-- Footer (Common Fragment) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
