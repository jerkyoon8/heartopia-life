<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js" defer></script>
    <style>
        .wiki-item-image {
            background: #F7F6F6 !important;
        }
    </style>
</head>

<body>
    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="mw-body">
        <div class="page-header"><i class="fas fa-leaf fa-2x text-success"></i>
            <h1>채집 도감 (Forageable Collection)
                <span sec:authorize="hasRole('ADMIN')"><button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addForageableModal" style="font-size:0.5em;vertical-align:middle;"><i class="fas fa-plus me-1"></i>채집물 추가</button></span>
            </h1>
        </div>
        <p class="text-secondary mb-4">하트피아 대륙 곳곳에서 채집하거나 주울 수 있는 다양한 아이템들에 대한 정보입니다.</p>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <!-- Search -->
            <div class="filter-group" style="flex-grow: 2;">
                <i class="fas fa-search text-secondary"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="이름 검색...">
            </div>
            <!-- Event Button -->
            <button type="button" id="btn-dream-event" class="btn btn-outline-dark rounded-pill px-3 shadow-sm d-flex align-items-center gap-2" style="border-width: 2px; font-weight: bold; white-space: nowrap;">
                <i class="fas fa-moon text-warning"></i> 꿈의 명암만 보기
            </button>

            <!-- Hidden Event Filter -->
            <select id="eventFilter" class="filter-select" style="display: none;">
                <option value="all">모든 이벤트</option>
                <option value="꿈의 명암">꿈의 명암</option>
            </select>
            <!-- Filters -->
            <select id="locationFilter" class="filter-select">
                <option value="all">모든 장소</option>
                <!-- Options populated by JS -->
            </select>

            <!-- Sort & Reset (Fragment) -->
            <div th:replace="~{fragments/wiki-components :: sortAndReset}"></div>
        </div>

        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults"><i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <!-- Forageable Card Loop -->
            <div th:each="item : ${forageableList}" class="wiki-item-card" th:data-name="${item.name}"
                th:data-location="${item.location}" th:data-price="${item.price}"
                th:data-event="${item.eventName != null ? item.eventName : ''}">

                <div class="wiki-item-image">
                    <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" th:alt="${item.name}"
                        style="max-height: 100px; object-fit: contain;">
                    <i th:class="'fas fa-seedling fa-4x text-success fallback-icon'"
                        th:style="${item.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                </div>

                <div class="wiki-item-info">
                    <a th:href="@{/wiki/collections/forageable/{name}(name=${item.name})}" class="wiki-item-name">
                        <span th:text="${item.name}">채집물 이름</span>
                        <span th:if="${item.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${item.eventName}"></span>
                    </a>
                    <div class="mt-2 text-center">
                        <a th:href="@{/wiki/map(cat='forageable', name=${item.name})}"
                            class="wiki-item-tag location-link">
                            <i class="fas fa-map-marker-alt me-1"></i>
                            <span th:text="${item.location}">서식지</span>
                        </a>
                    </div>
                </div>

                <table class="wiki-item-stats">
                    <tr>
                        <td class="stat-label">판매 가격</td>
                        <td class="stat-value">
                            <i class="fas fa-coins text-warning me-1"></i>
                            <span th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}">0</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">에너지 회복</td>
                        <td class="stat-value">
                            <i class="fas fa-bolt text-info me-1"></i>
                            <span th:text="${item.energy}">-</span>
                        </td>
                    </tr>
                </table>
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addForageableModal" data-edit-title="채집물 수정"
                        th:data-item="${'{&quot;id&quot;:' + item.id + ',&quot;name&quot;:&quot;' + item.name + '&quot;,&quot;location&quot;:&quot;' + item.location + '&quot;,&quot;price&quot;:' + (item.price != null ? item.price : 'null') + ',&quot;energy&quot;:&quot;' + (item.energy != null ? item.energy : '') + '&quot;,&quot;imageUrl&quot;:&quot;' + (item.imageUrl != null ? item.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (item.eventName != null ? item.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i></button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete" th:data-name="${item.name}" th:data-delete-url="${'/wiki/admin/data/forageable/delete/' + item.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="wiki-table-container" id="wikiTable">
            <table class="wiki-table-layout">
                <thead>
                    <tr>
                        <th></th>
                        <th>이름</th>
                        <th>장소</th>
                        <th>판매가</th>
                        <th>에너지</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${forageableList}" class="wiki-table-row"
                        th:data-name="${item.name}"
                        th:data-location="${item.location}"
                        th:data-price="${item.price}"
                        th:data-event="${item.eventName != null ? item.eventName : ''}">
                        <td>
                            <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" th:alt="${item.name}" class="table-thumb">
                            <div th:unless="${item.imageUrl != null}" class="table-thumb-placeholder"><i class="fas fa-seedling"></i></div>
                        </td>
                        <td>
                            <a th:href="@{/wiki/collections/forageable/{name}(name=${item.name})}" class="table-name-link">
                                <span th:text="${item.name}">이름</span>
                                <span th:if="${item.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.7em;" th:text="${item.eventName}"></span>
                            </a>
                        </td>
                        <td>
                            <a th:href="@{/wiki/map(cat='forageable', name=${item.name})}" class="table-location-link">
                                <i class="fas fa-map-marker-alt me-1"></i>
                                <span th:text="${item.location}">장소</span>
                            </a>
                        </td>
                        <td class="table-price">
                            <i class="fas fa-coins text-warning me-1"></i>
                            <span th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}">0</span>
                        </td>
                        <td>
                            <i class="fas fa-bolt text-info me-1"></i>
                            <span th:text="${item.energy}">-</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 관리자 전용: 채집물 추가 모달 -->
        <div sec:authorize="hasRole('ADMIN')">
            <div class="modal fade" id="addForageableModal" tabindex="-1" data-add-title="새 채집물 추가"><div class="modal-dialog"><div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
                <div class="modal-header" style="background:linear-gradient(135deg,#4D342E,#795548);color:#fff;border-radius:20px 20px 0 0;padding:20px 24px;"><h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 채집물 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button></div>
                <form action="/wiki/admin/data/forageable/add" method="post" data-add-action="/wiki/admin/data/forageable/add" data-update-action="/wiki/admin/data/forageable/update" data-img-base="/images/forageable/"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><input type="hidden" name="id" value="" />
                    <div class="modal-body" style="padding:24px;"><div class="row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold">이름 *</label><input type="text" name="name" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">장소 *</label><input type="text" name="location" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">판매 가격</label><input type="number" name="price" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold">에너지</label><input type="text" name="energy" class="form-control"></div>
                        <div class="col-md-8"><label class="form-label fw-bold">이미지</label><div class="input-group"><span class="input-group-text" style="font-size:0.85rem;">/images/forageable/</span><input type="text" class="form-control img-filename" placeholder="파일명.png"></div><input type="hidden" name="imageUrl" /></div>
                        <div class="col-md-4"><label class="form-label fw-bold">이벤트</label><input type="text" name="eventName" class="form-control"></div>
                    </div></div>
                    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button><button type="submit" class="btn btn-admin-submit text-white" style="background:linear-gradient(135deg,#4D342E,#795548);">추가하기</button></div>
                </form>
            </div></div></div>
        </div>

        <!-- Footer (Common Fragment) -->
        <div th:replace="~{fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const btnDream = document.getElementById('btn-dream-event');
                const eventFilter = document.getElementById('eventFilter');
                let isDreamOnly = false;

                if (btnDream && eventFilter) {
                    btnDream.addEventListener('click', function() {
                        isDreamOnly = !isDreamOnly;
                        if(isDreamOnly) {
                            eventFilter.value = '꿈의 명암';
                            btnDream.classList.remove('btn-outline-dark');
                            btnDream.classList.add('btn-dark');
                        } else {
                            eventFilter.value = 'all';
                            btnDream.classList.remove('btn-dark');
                            btnDream.classList.add('btn-outline-dark');
                        }
                        eventFilter.dispatchEvent(new Event('change'));
                    });
                }

                new WikiFilter({
                    gridId: 'wikiGrid',
                    tableId: 'wikiTable',
                    itemSelector: '.wiki-item-card',
                    filters: [
                        { id: 'eventFilter', dataKey: 'event', autoPopulate: true },
                        { id: 'locationFilter', dataKey: 'location', autoPopulate: true }
                    ]
                });
            });
        </script>
    <script src="/js/admin-data.js" defer></script>
</body>

</html>
