<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <style>
        .admin-header {
            background-color: #4D342E;
            color: #fff;
            padding: 40px 0;
            margin-bottom: 40px;
            border-radius: 0 0 40px 40px;
        }

        .report-table-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }

        .table> :not(caption)>*>* {
            padding: 15px 10px;
        }

        .badge-cat {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .cat-BUG {
            background: #ffebee;
            color: #c62828;
        }

        .cat-CONTRIBUTION {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .cat-HELP {
            background: #e3f2fd;
            color: #1565c0;
        }

        .cat-BUSINESS {
            background: var(--nav-hover);
            color: #e65100;
        }

        .cat-GENERAL {
            background: #f5f5f5;
            color: #616161;
        }

        .message-cell {
            max-width: 300px;
            white-space: pre-wrap;
            font-size: 0.9rem;
        }

        .source-link {
            font-size: 0.8rem;
            color: #0d6efd;
            text-decoration: none;
        }

        .source-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="admin-header">
        <div class="container container-custom">
            <h1 class="fw-bold"><i class="fas fa-clipboard-list me-3"></i>위키 제보 관리</h1>
            <p class="opacity-75 mb-0">사용자가 보내주신 정보 수정 및 보충 제보 내역을 확인하고 관리하는 공간입니다.</p>
        </div>
    </div>

    <div class="mw-body" style="padding-top: 0;">
        <div class="report-table-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">전체 제보 목록 (<span th:text="${reports.size()}">0</span>)</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">
                    <i class="fas fa-sync-alt me-1"></i> 새로고침
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>작성일시</th>
                            <th>구분</th>
                            <th>제보자 정보</th>
                            <th>대상 아이템</th>
                            <th>상세 내용</th>
                            <th>링크</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="report : ${reports}">
                            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <!-- 한글 카테고리 매핑 -->
                                <span th:class="'badge-cat cat-' + ${report.category}" th:switch="${report.category}">
                                    <span th:case="'BUG'">오류 제보</span>
                                    <span th:case="'CONTRIBUTION'">정보 추가</span>
                                    <span th:case="'HELP'">이용 안내</span>
                                    <span th:case="'GENERAL'">기타 문의</span>
                                    <span th:case="*" th:text="${report.category}"></span>
                                </span>
                            </td>
                            <td>
                                <strong th:text="${report.reporterName}"></strong>
                            </td>
                            <td>
                                <span th:if="${report.itemName}" class="badge bg-light text-dark py-2 px-3 border"
                                    th:text="${report.itemName}"></span>
                                <span th:unless="${report.itemName}" class="text-muted small">N/A</span>
                            </td>
                            <td class="message-cell" th:text="${report.message}"></td>
                            <td>
                                <a th:if="${not #strings.isEmpty(report.sourceUrl)}" th:href="${report.sourceUrl}" target="_blank"
                                    class="source-link">
                                    <i class="fas fa-external-link-alt me-1"></i> 원본
                                </a>
                                <span th:unless="${not #strings.isEmpty(report.sourceUrl)}" class="text-muted small">출처 매핑 안됨</span>
                            </td>
                            <td>
                                <!-- 상태 변경 폼 -->
                                <form th:action="@{/wiki/admin/reports/{id}/public(id=${report.id})}" method="post" style="display:inline-block; margin-bottom: 4px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="status" th:value="${!report.isPublic}">
                                    <button type="submit" class="btn btn-sm" th:classappend="${report.isPublic ? 'btn-outline-warning' : 'btn-outline-success'}" th:text="${report.isPublic ? '비공개로' : '공개로'}">상태 변경</button>
                                </form>
                                <!-- 삭제 폼 -->
                                <form th:action="@{/wiki/admin/reports/{id}/delete(id=${report.id})}" method="post" style="display:inline-block;" onsubmit="return confirm('이 제보를 영구적으로 삭제하시겠습니까?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                                <!-- 관리자 답변 폼 -->
                                <form th:action="@{/wiki/admin/reports/{id}/reply(id=${report.id})}" method="post" style="margin-top: 8px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <textarea name="adminReply" rows="2"
                                        style="width:100%; font-size:0.8rem; border-radius:8px; border:1px solid #ddd; padding:4px 8px; resize:vertical;"
                                        th:placeholder="${report.adminReply != null ? '답변 수정' : '답변 입력'}"
                                        th:text="${report.adminReply}"></textarea>
                                    <button type="submit" class="btn btn-sm btn-outline-primary mt-1" style="font-size:0.75rem; width:100%;">
                                        <i class="fas fa-reply me-1"></i>답변 저장
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${reports.isEmpty()}">
                            <td colspan="7" class="text-center py-5 text-muted">아직 접수된 제보가 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
