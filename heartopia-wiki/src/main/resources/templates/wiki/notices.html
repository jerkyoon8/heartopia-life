<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <style>
        .notice-container {
            max-width: 800px;
            margin: 120px auto 50px;
            padding: 0 20px;
            min-height: 60vh;
        }
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-title {
            font-family: 'Paperlogy-4Regular', sans-serif;
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .notice-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .notice-item {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .notice-item:hover {
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border-color: #ff7f9d;
            transform: translateY(-2px);
        }
        .notice-badge {
            display: inline-block;
            background: #ff4757;
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .notice-title {
            font-family: 'Paperlogy', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 10px;
        }
        .notice-content {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-line;
        }
        .notice-date {
            font-size: 0.8rem;
            color: #aaa;
            text-align: right;
            border-top: 1px dashed #eee;
            padding-top: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body class="mw-body">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="notice-container">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-bullhorn" style="color:#ff7f9d;"></i> 소식 및 업데이트
                <span sec:authorize="hasRole('ADMIN')">
                    <button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addNoticeModal" style="font-size:0.5em;vertical-align:middle;">
                        <i class="fas fa-plus me-1"></i>공지 작성
                    </button>
                </span>
            </h1>
            <p style="color:#666;">두근두근 타운 위키의 최신 변경사항을 확인하세요.</p>
        </div>

        <div class="notice-list" th:if="${not #lists.isEmpty(notices)}">
            <div th:each="notice : ${notices}" class="notice-item" th:if="${notice.isActive}">
                <div><span class="notice-badge">공지</span></div>
                <div class="notice-title" th:text="${notice.title}">공지사항 제목</div>
                <div class="notice-content" th:text="${notice.content}">공지사항 내용</div>
                <div class="notice-date" th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-25 12:00</div>

                <!-- 관리자 전용: 편집/삭제 버튼 -->
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-notice-edit"
                        th:data-id="${notice.id}" th:data-title="${notice.title}" th:data-content="${notice.content}">
                        <i class="fas fa-edit"></i></button>
                    <form th:action="@{/wiki/admin/notices/delete}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="id" th:value="${notice.id}" />
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('이 공지를 삭제하시겠습니까?');">
                            <i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(notices)}" class="empty-state">
            <i class="fas fa-inbox fa-3x" style="color:#ddd; margin-bottom:15px;"></i>
            <p>아직 등록된 소식이 없습니다.</p>
        </div>
    </div>

    <!-- 관리자 전용: 공지 작성 모달 -->
    <div sec:authorize="hasRole('ADMIN')">
        <div class="modal fade" id="addNoticeModal" tabindex="-1" data-add-title="새 공지 작성">
            <div class="modal-dialog modal-lg">
                <div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
                    <div class="modal-header" style="background:var(--modal-header-danger);color:var(--modal-header-text);border-radius:20px 20px 0 0;padding:20px 24px;">
                        <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 공지 작성</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button>
                    </div>
                    <form th:action="@{/wiki/admin/notices/add}" method="post" data-add-action="/wiki/admin/notices/add" data-update-action="/wiki/admin/notices/update">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="id" value="" />
                        <div class="modal-body" style="padding:24px;">
                            <div class="mb-3">
                                <label class="form-label fw-bold">제목 *</label>
                                <input type="text" name="title" class="form-control" required placeholder="공지 제목을 입력하세요">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">내용 *</label>
                                <textarea name="content" class="form-control" rows="6" required placeholder="공지 내용을 입력하세요"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                            <button type="submit" class="btn btn-admin-submit text-white" style="background:linear-gradient(135deg,#ff4757,#ff7f9d);">작성하기</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-data.js?v=1.1" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 공지 수정 버튼 클릭 처리
            document.querySelectorAll('.btn-notice-edit').forEach(btn => {
                btn.addEventListener('click', function() {
                    const modal = document.getElementById('addNoticeModal');
                    if (!modal) return;
                    const form = modal.querySelector('form');
                    // action을 update로 변경
                    form.action = form.dataset.updateAction;
                    // 모달 제목 변경
                    modal.querySelector('.modal-title').innerHTML = '<i class="fas fa-edit me-2"></i>공지 수정';
                    // submit 버튼 텍스트
                    modal.querySelector('.btn-admin-submit').textContent = '수정하기';
                    // 데이터 채우기
                    form.querySelector('input[name="id"]').value = this.dataset.id;
                    form.querySelector('input[name="title"]').value = this.dataset.title;
                    form.querySelector('textarea[name="content"]').value = this.dataset.content;
                    // 모달 열기
                    new bootstrap.Modal(modal).show();
                });
            });
        });
    </script>
</body>
</html>
