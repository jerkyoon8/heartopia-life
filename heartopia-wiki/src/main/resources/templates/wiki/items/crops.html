<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js?v=1.7" defer></script>
</head>

<body>

    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="mw-body">
        <div class="page-header">
            <i class="fas fa-carrot fa-2x text-primary"></i>
            <h1>작물 도감 (Crop Collection)
                <span sec:authorize="hasRole('ADMIN')"><button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addCropModal" style="font-size:0.5em;vertical-align:middle;"><i class="fas fa-plus me-1"></i>작물 추가</button></span>
            </h1>
        </div>

        <!-- Filter Bar (Redesign) -->
        <div class="wiki-filter-container">
            <div class="filter-top-tier">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="작물 이름 검색...">
                </div>
                
                <!-- 꿈의 명암 스위치 -->
                <div class="toggle-switch-wrapper" style="box-shadow: none; border-color: transparent; background: transparent; padding: 0;">
                    <label class="toggle-switch-label">
                        <label class="switch">
                            <input type="checkbox" id="btn-dream-event">
                            <span class="slider"></span>
                        </label>
                        <i class="fas fa-moon text-warning"></i> 꿈의 명암만 표시
                    </label>
                </div>
                
                <!-- 수집된 항목 숨기기 스위치 -->
                <div class="toggle-switch-wrapper" style="box-shadow: none; border-color: transparent; background: transparent; padding: 0;">
                    <label class="toggle-switch-label">
                        <label class="switch">
                            <input type="checkbox" id="btn-hide-collected">
                            <span class="slider"></span>
                        </label>
                        <i class="fas fa-eye-slash text-secondary"></i> 수집된 항목 숨기기
                    </label>
                </div>
                
                <select id="eventFilter" style="display: none;">
                    <option value="all">모든 이벤트</option>
                    <option value="꿈의 명암">꿈의 명암</option>
                </select>

                <button type="button" class="btn-filter-toggle" onclick="document.getElementById('advancedFilters').classList.toggle('show')">
                    <i class="fas fa-sliders-h"></i> 상세 옵션 <i class="fas fa-chevron-down ms-1"></i>
                </button>
                
                <button type="button" id="resetBtn" class="btn-reset-icon" title="초기화">
                    <i class="fas fa-undo"></i>
                </button>
            </div>
            
            <div class="filter-advanced-tier" id="advancedFilters">
                
                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-filter"></i> 조건 검색</div>
                    <div class="advanced-controls-box">
                        <div class="filter-select-wrapper">
                            <span class="prefix">레벨</span>
                            <select id="levelFilter">
                                <option value="all">모든 레벨</option>
                                <option value="1">Lv.1</option>
                                <option value="2">Lv.2</option>
                                <option value="3">Lv.3</option>
                                <option value="4">Lv.4</option>
                                <option value="5">Lv.5</option>
                                <option value="6">Lv.6</option>
                                <option value="7">Lv.7</option>
                                <option value="8">Lv.8</option>
                                <option value="9">Lv.9</option>
                                <option value="10">Lv.10+</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="advanced-divider"></div>

                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-sort-amount-down"></i> 결과 정렬 및 보기</div>
                    <div class="advanced-controls-box">
                        <div th:replace="~{fragments/wiki-components :: sortAndReset}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults">
                <i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <!-- Crop Card Loop -->
            <div th:each="crop : ${cropList}" class="wiki-item-card sync-item" th:data-sync-key="'crop_' + ${crop.name}" th:data-name="${crop.name}"
                th:data-level="${crop.level}" th:data-price="${crop.prices[0]}"
                th:data-event="${crop.eventName != null ? crop.eventName : ''}">

                <div class="wiki-item-image sync-container">
                    <div class="sync-check-btn" title="수집 처리 (0별)"><i class="fas fa-check"></i></div>
                    <img th:if="${crop.imageUrl != null}" th:src="${crop.imageUrl}" th:alt="${crop.name}"
                        style="max-height: 100px; object-fit: contain;">
                    <i th:class="'fas fa-leaf fa-4x text-success fallback-icon'"
                        th:style="${crop.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                </div>

                <div class="wiki-item-info">
                    <a th:href="@{/wiki/items/crops/{name}(name=${crop.name})}" class="wiki-item-name mb-0">
                        <span th:text="${crop.name}">작물 이름</span>
                        <span th:if="${crop.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${crop.eventName}"></span>
                    </a>
                    <div class="sync-stars">
                        <i class="fas fa-star sync-star-icon" data-val="1"></i>
                        <i class="fas fa-star sync-star-icon" data-val="2"></i>
                        <i class="fas fa-star sync-star-icon" data-val="3"></i>
                        <i class="fas fa-star sync-star-icon" data-val="4"></i>
                        <i class="fas fa-star sync-star-icon" data-val="5"></i>
                    </div>
                </div>

                <table class="wiki-item-stats">
                    <tr>
                        <td class="stat-label">요구 레벨</td>
                        <td class="stat-value">
                            <span th:if="${crop.level != null}" th:text="${crop.level} + ' Lv.'">Lv.1</span>
                            <span th:unless="${crop.level != null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">성장 시간</td>
                        <td class="stat-value" th:text="${crop.growthTime != null ? crop.growthTime : '-'}">1일</td>
                    </tr>
                    <tr>
                        <td class="stat-label">씨앗 구매</td>
                        <td class="stat-value text-danger">
                            <span th:if="${crop.seedBuyPrice != null}" th:text="${crop.seedBuyPrice}">0</span>
                            <span th:unless="${crop.seedBuyPrice != null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">씨앗 판매</td>
                        <td class="stat-value">
                            <span th:if="${crop.seedSellPrice != null}" th:text="${crop.seedSellPrice}">0</span>
                            <span th:unless="${crop.seedSellPrice != null}">-</span>
                        </td>
                    </tr>
                </table>

                <!-- Price Fragment -->
                <div th:replace="~{fragments/wiki-components :: priceDisplay(${crop.prices})}"></div>
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addCropModal" data-edit-title="작물 수정"
                        th:data-item="${'{&quot;id&quot;:' + crop.id + ',&quot;name&quot;:&quot;' + crop.name + '&quot;,&quot;level&quot;:' + (crop.level != null ? crop.level : 'null') + ',&quot;growthTime&quot;:&quot;' + (crop.growthTime != null ? crop.growthTime : '') + '&quot;,&quot;seedBuyPrice&quot;:' + (crop.seedBuyPrice != null ? crop.seedBuyPrice : 'null') + ',&quot;seedSellPrice&quot;:' + (crop.seedSellPrice != null ? crop.seedSellPrice : 'null') + ',&quot;price1&quot;:' + (crop.price1 != null ? crop.price1 : 'null') + ',&quot;price2&quot;:' + (crop.price2 != null ? crop.price2 : 'null') + ',&quot;price3&quot;:' + (crop.price3 != null ? crop.price3 : 'null') + ',&quot;price4&quot;:' + (crop.price4 != null ? crop.price4 : 'null') + ',&quot;price5&quot;:' + (crop.price5 != null ? crop.price5 : 'null') + ',&quot;imageUrl&quot;:&quot;' + (crop.imageUrl != null ? crop.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (crop.eventName != null ? crop.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i></button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete" th:data-name="${crop.name}" th:data-delete-url="${'/wiki/admin/data/crop/delete/' + crop.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="wiki-table-container" id="wikiTable">
            <table class="wiki-table-layout">
                <thead>
                    <tr>
                        <th></th>
                        <th>이름</th>
                        <th>레벨</th>
                        <th>성장시간</th>
                        <th>씨앗 구매</th>
                        <th>씨앗 판매</th>
                        <th>판매가(1★)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="crop : ${cropList}" class="wiki-table-row"
                        th:data-name="${crop.name}"
                        th:data-level="${crop.level}"
                        th:data-price="${crop.prices[0]}"
                        th:data-event="${crop.eventName != null ? crop.eventName : ''}">
                        <td>
                            <img th:if="${crop.imageUrl != null}" th:src="${crop.imageUrl}" th:alt="${crop.name}" class="table-thumb">
                            <div th:unless="${crop.imageUrl != null}" class="table-thumb-placeholder"><i class="fas fa-carrot"></i></div>
                        </td>
                        <td>
                            <a th:href="@{/wiki/items/crops/{name}(name=${crop.name})}" class="table-name-link">
                                <span th:text="${crop.name}">이름</span>
                                <span th:if="${crop.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.7em;" th:text="${crop.eventName}"></span>
                            </a>
                        </td>
                        <td>
                            <span th:if="${crop.level != null}" th:text="${crop.level} + ' Lv.'">1 Lv.</span>
                            <span th:unless="${crop.level != null}">-</span>
                        </td>
                        <td th:text="${crop.growthTime != null ? crop.growthTime : '-'}">1일</td>
                        <td class="text-danger">
                            <span th:if="${crop.seedBuyPrice != null}" th:text="${crop.seedBuyPrice}">0</span>
                            <span th:unless="${crop.seedBuyPrice != null}">-</span>
                        </td>
                        <td>
                            <span th:if="${crop.seedSellPrice != null}" th:text="${crop.seedSellPrice}">0</span>
                            <span th:unless="${crop.seedSellPrice != null}">-</span>
                        </td>
                        <td class="table-price" th:text="${crop.prices[0]}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const btnDream = document.getElementById('btn-dream-event');
            const eventFilter = document.getElementById('eventFilter');

            if (btnDream && eventFilter) {
                btnDream.addEventListener('change', function() {
                    if(this.checked) {
                        eventFilter.value = '꿈의 명암';
                    } else {
                        eventFilter.value = 'all';
                    }
                    eventFilter.dispatchEvent(new Event('change'));
                });
                
                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => {
                        btnDream.checked = false;
                    });
                }
            }

            new WikiFilter({
                gridId: 'wikiGrid',
                tableId: 'wikiTable',
                itemSelector: '.wiki-item-card',
                filters: [
                    { id: 'eventFilter', dataKey: 'event', autoPopulate: true },
                    { id: 'levelFilter', dataKey: 'level' }
                ]
            });
        });
    </script>

    <!-- 관리자 전용: 작물 추가 모달 -->
    <div sec:authorize="hasRole('ADMIN')">
        <div class="modal fade" id="addCropModal" tabindex="-1" data-add-title="새 작물 추가"><div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius:20px;border:none;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div class="modal-header" style="background:var(--modal-header-bg);color:var(--modal-header-text);border-radius:20px 20px 0 0;padding:20px 24px;"><h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>새 작물 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal" style="filter:invert(1);"></button></div>
            <form action="/wiki/admin/data/crop/add" method="post" enctype="multipart/form-data" data-add-action="/wiki/admin/data/crop/add" data-update-action="/wiki/admin/data/crop/update"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><input type="hidden" name="id" value="" />
                <div class="modal-body" style="padding:24px;"><div class="row g-3">
                    <div class="col-md-6"><label class="form-label fw-bold">이름 *</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label fw-bold">레벨</label><input type="number" name="level" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label fw-bold">성장 시간</label><input type="text" name="growthTime" class="form-control" placeholder="1일"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">씨앗 구매가</label><input type="number" name="seedBuyPrice" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold">씨앗 판매가</label><input type="number" name="seedSellPrice" class="form-control"></div>
                    <div class="col-12"><label class="form-label fw-bold">판매가 (1★~5★)</label><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"><input type="number" name="price1" class="form-control" placeholder="1★"><input type="number" name="price2" class="form-control" placeholder="2★"><input type="number" name="price3" class="form-control" placeholder="3★"><input type="number" name="price4" class="form-control" placeholder="4★"><input type="number" name="price5" class="form-control" placeholder="5★"></div></div>
                    <div class="col-md-8"><label class="form-label fw-bold">이미지</label><div class="img-upload-wrapper"><input type="file" name="imageFile" class="form-control img-file-input" accept="image/*"><input type="hidden" name="existingImageUrl" /><div class="img-preview mt-2" style="display:none;"><img src="" alt="미리보기" style="max-height:80px;object-fit:contain;border-radius:8px;"></div></div></div>
                    <div class="col-md-4"><label class="form-label fw-bold">이벤트</label><input type="text" name="eventName" class="form-control"></div>
                </div></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button><button type="submit" class="btn btn-admin-submit text-white" style="background:var(--modal-header-bg);">추가하기</button></div>
            </form>
        </div></div></div>
    </div>

    <!-- Footer (Common Fragment) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-data.js" defer></script>
</body>

</html>
