<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Wiki Filter JS -->
    <script src="/js/wiki-filter.js?v=2.4" defer></script>
</head>

<body>

    <!-- Navbar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="mw-body">
        <div class="page-header">
            <i class="fas fa-seedling fa-2x text-primary"></i>
            <h1>꽃 도감 (Flower Collection)
                <span sec:authorize="hasRole('ADMIN')"><button type="button" class="btn btn-primary btn-sm rounded-pill shadow-sm ms-3 btn-admin-add" data-bs-toggle="modal" data-bs-target="#addFlowerModal" style="font-size:0.5em;vertical-align:middle;"><i class="fas fa-plus me-1"></i>꽃 추가</button></span>
            </h1>
        </div>

        <!-- Filter Bar (Redesign) -->
        <div class="wiki-filter-container">
            <div class="filter-top-tier">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="꽃 이름 검색...">
                </div>

                <button type="button" class="btn-flower-guide" data-bs-toggle="modal" data-bs-target="#flowerGuideImageModal">
                    <i class="fas fa-book-open"></i>
                    꽃 교배 가이드
                </button>
                
                <!-- 수집된 항목 숨기기 스위치 -->
                <div class="toggle-switch-wrapper" style="box-shadow: none; border-color: transparent; background: transparent; padding: 0;">
                    <label class="toggle-switch-label">
                        <label class="switch">
                            <input type="checkbox" id="btn-hide-collected">
                            <span class="slider"></span>
                        </label>
                        <i class="fas fa-eye-slash text-secondary"></i> 수집된 항목 숨기기
                    </label>
                </div>
                
                <button type="button" class="btn-filter-toggle" onclick="document.getElementById('advancedFilters').classList.toggle('show')">
                    <i class="fas fa-sliders-h"></i> 상세 옵션 <i class="fas fa-chevron-down ms-1"></i>
                </button>
                
                <button type="button" id="resetBtn" class="btn-reset-icon" title="초기화">
                    <i class="fas fa-undo"></i>
                </button>
            </div>
            
            <div class="filter-advanced-tier" id="advancedFilters">
                
                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-filter"></i> 조건 검색</div>
                    <div class="advanced-controls-box">
                        <div class="filter-select-wrapper">
                            <span class="prefix">이벤트</span>
                            <select id="eventFilter">
                                <option value="all">모든 이벤트</option>
                            </select>
                        </div>

                        <div class="filter-select-wrapper filter-multi-select-wrapper" id="levelFilter">
                            <span class="prefix">레벨</span>
                            <div class="multi-select-trigger" id="levelTrigger">
                                <span class="trigger-label">모든 레벨</span>
                                <i class="fas fa-chevron-down ms-2 text-muted" style="font-size: 0.75rem;"></i>
                            </div>
                            <div class="multi-select-dropdown" id="levelDropdown">
                                <div class="dropdown-opt">
                                    <label><input type="checkbox" value="all" checked> 모든 레벨</label>
                                </div>
                                <div class="dropdown-div"></div>
                                <div class="dropdown-opt" th:each="i : ${#numbers.sequence(1, 14)}">
                                    <label>
                                        <input type="checkbox" class="lvl-checkbox" th:value="${i}">
                                        [[${'Lv.' + i}]]
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="advanced-divider"></div>

                <div class="advanced-section">
                    <div class="section-label"><i class="fas fa-sort-amount-down"></i> 결과 정렬 및 보기</div>
                    <div class="advanced-controls-box">
                        <div th:replace="~{fragments/wiki-components :: sortAndReset}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="wiki-grid-layout" id="wikiGrid">
            <div class="no-results" id="noResults">
                <i class="fas fa-search fa-3x mb-3 text-muted"></i>
                <p>검색 결과가 없습니다.</p>
            </div>

            <!-- Flower Card Loop -->
            <div th:each="flower, iterStat : ${flowerList}" class="wiki-item-card sync-item" th:data-id="${iterStat.index}" th:data-sync-key="'flower_' + ${flower.name}" th:data-name="${flower.name}"
                th:data-level="${flower.level}" th:data-price="${flower.prices[0]}"
                th:data-event="${flower.eventName != null ? flower.eventName : ''}">

                <div class="wiki-item-image sync-container">
                    <div class="sync-check-btn" title="수집 처리 (0별)"><i class="fas fa-check"></i></div>
                    <img class="flower-main-img"
                         th:if="${flower.imageUrl != null}"
                         th:src="${flower.imageUrl}"
                         th:alt="${flower.name}"
                         style="max-height: 100px; object-fit: contain;">
                    <i th:class="'fas fa-fan fa-4x text-danger fallback-icon'"
                        th:style="${flower.imageUrl != null ? 'display: none; opacity: 0.7;' : 'display: flex; opacity: 0.7;'}"></i>
                    <div class="d-none" th:if="${flower.imageUrls != null and !flower.imageUrls.isEmpty()}">
                        <span th:each="imgUrl : ${flower.imageUrls}"
                              class="flower-legacy-image-data"
                              th:data-src="${imgUrl}"></span>
                    </div>
                </div>

                <div class="wiki-item-info">
                    <a th:href="@{/wiki/items/flowers/{name}(name=${flower.name})}" class="wiki-item-name mb-0">
                        <span th:text="${flower.name}">꽃 이름</span>
                        <span th:if="${flower.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.65em; vertical-align: middle;" th:text="${flower.eventName}"></span>
                    </a>
                    <div class="sync-stars">
                        <i class="fas fa-star sync-star-icon" data-val="1"></i>
                        <i class="fas fa-star sync-star-icon" data-val="2"></i>
                        <i class="fas fa-star sync-star-icon" data-val="3"></i>
                        <i class="fas fa-star sync-star-icon" data-val="4"></i>
                        <i class="fas fa-star sync-star-icon" data-val="5"></i>
                    </div>
                    <button type="button" class="flower-breeding-btn" th:data-flower-name="${flower.name}"
                        th:data-growth-time="${flower.growthTime != null ? flower.growthTime : '-'}"
                        th:data-level="${flower.level != null ? flower.level : ''}">
                        <i class="fas fa-seedling"></i>
                        <span>상세정보 및 교배 표</span>
                    </button>
                </div>

                <div class="flower-structured-data d-none">
                    <div th:each="variant, stat : ${flower.variants}"
                         class="flower-variant-data"
                         th:data-sort="${variant.sortOrder != null ? variant.sortOrder : stat.index}"
                         th:data-stars="${variant.stars != null ? variant.stars : ''}"
                         th:data-color-name="${variant.colorName != null ? variant.colorName : ''}"
                         th:data-image-url="${variant.imageUrl != null ? variant.imageUrl : ''}"></div>
                    <div th:each="rule, stat : ${flower.breedingRules}"
                         class="flower-rule-data"
                         th:data-result-sort="${rule.result != null && rule.result.sortOrder != null ? rule.result.sortOrder : ''}"
                         th:data-note="${rule.note != null ? rule.note : ''}">
                        <span th:each="option : ${rule.leftOptions}"
                              class="rule-left-option"
                              th:data-sort="${option.sortOrder != null ? option.sortOrder : ''}"></span>
                        <span th:each="option : ${rule.rightOptions}"
                              class="rule-right-option"
                              th:data-sort="${option.sortOrder != null ? option.sortOrder : ''}"></span>
                    </div>
                </div>

                <table class="wiki-item-stats">
                    <tr>
                        <td class="stat-label">요구 레벨</td>
                        <td class="stat-value">
                            <span th:if="${flower.level != null}" th:text="${flower.level} + ' Lv.'">Lv.1</span>
                            <span th:unless="${flower.level != null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">성장 시간</td>
                        <td class="stat-value" th:text="${flower.growthTime != null ? flower.growthTime : '-'}">1일</td>
                    </tr>
                    <tr>
                        <td class="stat-label">씨앗 구매</td>
                        <td class="stat-value text-danger">
                            <span th:if="${flower.seedBuyPrice != null}" th:text="${flower.seedBuyPrice}">0</span>
                            <span th:unless="${flower.seedBuyPrice != null}">-</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="stat-label">씨앗 판매</td>
                        <td class="stat-value">
                            <span th:if="${flower.seedSellPrice != null}" th:text="${flower.seedSellPrice}">0</span>
                            <span th:unless="${flower.seedSellPrice != null}">-</span>
                        </td>
                    </tr>
                </table>

                <!-- Price Fragment -->
                <div th:replace="~{fragments/wiki-components :: priceDisplay(${flower.prices})}"></div>
                <div sec:authorize="hasRole('ADMIN')" class="text-end mt-2" style="border-top:1px solid #eee;padding-top:8px;">
                    <button type="button" class="btn btn-outline-warning btn-sm btn-admin-edit" data-modal-target="addFlowerModal" data-edit-title="꽃 수정"
                        th:data-item="${'{&quot;id&quot;:' + flower.id + ',&quot;name&quot;:&quot;' + flower.name + '&quot;,&quot;level&quot;:' + (flower.level != null ? flower.level : 'null') + ',&quot;growthTime&quot;:&quot;' + (flower.growthTime != null ? flower.growthTime : '') + '&quot;,&quot;seedBuyPrice&quot;:' + (flower.seedBuyPrice != null ? flower.seedBuyPrice : 'null') + ',&quot;seedSellPrice&quot;:' + (flower.seedSellPrice != null ? flower.seedSellPrice : 'null') + ',&quot;price1&quot;:' + (flower.price1 != null ? flower.price1 : 'null') + ',&quot;price2&quot;:' + (flower.price2 != null ? flower.price2 : 'null') + ',&quot;price3&quot;:' + (flower.price3 != null ? flower.price3 : 'null') + ',&quot;price4&quot;:' + (flower.price4 != null ? flower.price4 : 'null') + ',&quot;price5&quot;:' + (flower.price5 != null ? flower.price5 : 'null') + ',&quot;imageUrl&quot;:&quot;' + (flower.imageUrl != null ? flower.imageUrl : '') + '&quot;,&quot;eventName&quot;:&quot;' + (flower.eventName != null ? flower.eventName : '') + '&quot;}'}">
                        <i class="fas fa-edit"></i></button>
                    <button type="button" class="btn btn-outline-danger btn-sm btn-admin-delete" th:data-name="${flower.name}" th:data-delete-url="${'/wiki/admin/data/flower/delete/' + flower.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="wiki-table-container" id="wikiTable">
            <table class="wiki-table-layout">
                <thead>
                    <tr>
                        <th></th>
                        <th>이름</th>
                        <th>레벨</th>
                        <th>성장시간</th>
                        <th>씨앗 구매</th>
                        <th>씨앗 판매</th>
                        <th>판매가(1★)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="flower, iterStat : ${flowerList}" class="wiki-table-row"
                        th:data-id="${iterStat.index}"
                        th:data-name="${flower.name}"
                        th:data-level="${flower.level}"
                        th:data-price="${flower.prices[0]}"
                        th:data-event="${flower.eventName != null ? flower.eventName : ''}">
                        <td>
                            <img th:if="${flower.imageUrl != null}" th:src="${flower.imageUrl}" th:alt="${flower.name}" class="table-thumb">
                            <div th:unless="${flower.imageUrl != null}" class="table-thumb-placeholder"><i class="fas fa-seedling"></i></div>
                        </td>
                        <td>
                            <a th:href="@{/wiki/items/flowers/{name}(name=${flower.name})}" class="table-name-link">
                                <span th:text="${flower.name}">이름</span>
                                <span th:if="${flower.eventName != null}" class="badge bg-warning text-dark ms-2 event-badge" style="font-size: 0.7em;" th:text="${flower.eventName}"></span>
                            </a>
                        </td>
                        <td>
                            <span th:if="${flower.level != null}" th:text="${flower.level} + ' Lv.'">1 Lv.</span>
                            <span th:unless="${flower.level != null}">-</span>
                        </td>
                        <td th:text="${flower.growthTime != null ? flower.growthTime : '-'}">1일</td>
                        <td class="text-danger">
                            <span th:if="${flower.seedBuyPrice != null}" th:text="${flower.seedBuyPrice}">0</span>
                            <span th:unless="${flower.seedBuyPrice != null}">-</span>
                        </td>
                        <td>
                            <span th:if="${flower.seedSellPrice != null}" th:text="${flower.seedSellPrice}">0</span>
                            <span th:unless="${flower.seedSellPrice != null}">-</span>
                        </td>
                        <td class="table-price" th:text="${flower.prices[0]}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <style>
        .btn-flower-guide {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-color);
            font-weight: 800;
            white-space: nowrap;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .btn-flower-guide:hover {
            transform: translateY(-1px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 20px var(--shadow);
        }
        .btn-flower-guide i {
            color: var(--accent-color);
        }
        .flower-guide-image-modal .modal-dialog {
            max-width: min(1120px, calc(100vw - 32px));
        }
        .flower-guide-image-modal .modal-content {
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            overflow: hidden;
            background: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 22px 70px var(--shadow);
        }
        .flower-guide-image-modal .modal-header {
            border-bottom: 1px solid var(--border-subtle);
            background: var(--filter-bg);
            padding: 16px 20px;
        }
        .flower-guide-image-modal .modal-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
        }
        .flower-guide-image-modal .modal-body {
            padding: 16px;
            background: var(--card-bg);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .flower-guide-full-img {
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            background: #fff;
        }
        [data-theme='dark'] .flower-guide-image-modal .btn-close {
            filter: invert(1);
        }
        @media (max-width: 575.98px) {
            .flower-guide-image-modal .modal-body {
                padding: 12px;
            }
            .flower-guide-full-img {
                min-width: 720px;
            }
        }
        .flower-breeding-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            padding: 9px 12px;
            border: 1px solid #ffd6e0;
            border-radius: 999px;
            background: #fff7fa;
            color: #e83e66;
            font-size: 0.85rem;
            font-weight: 700;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }
        .flower-breeding-btn:hover {
            background: #ffeaf0;
            border-color: #ff9db4;
            transform: translateY(-1px);
        }
        .flower-breeding-modal .modal-content {
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            overflow: hidden;
            background: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 22px 70px var(--shadow);
        }
        .flower-breeding-modal .modal-header {
            border-bottom: 1px solid var(--border-subtle);
            padding: 18px 22px;
            background: var(--filter-bg);
        }
        .flower-breeding-modal .modal-dialog {
            max-width: 576px;
        }
        .flower-breeding-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 800;
        }
        .flower-breeding-title img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 50%;
            background: var(--main-bg-color);
            padding: 4px;
        }
        .flower-breeding-modal .btn-close {
            opacity: 0.8;
        }
        .flower-breeding-modal .modal-body {
            max-height: min(72vh, 780px);
            overflow-y: auto;
            padding: 20px 22px;
        }
        .breeding-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .breeding-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--main-bg-color);
            color: var(--stat-value);
            font-size: 0.82rem;
            font-weight: 700;
        }
        .breeding-section-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0 10px;
            padding: 6px 10px;
            border: 1px solid #ffd6e0;
            border-radius: 999px;
            background: #fff7fa;
            color: #d63384;
            font-size: 0.8rem;
            font-weight: 800;
        }
        .breeding-grade-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 2px 2px 10px;
            margin-bottom: 20px;
        }
        .breeding-grade {
            flex: 0 0 78px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-height: 92px;
            padding: 10px 7px;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            background: var(--filter-bg);
        }
        .breeding-grade img,
        .breeding-flower-node img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 50%;
            background: var(--main-bg-color);
            padding: 5px;
        }
        .breeding-grade-stars {
            color: #f8c64d;
            font-size: 0.78rem;
            line-height: 1;
            white-space: nowrap;
        }
        .breeding-grade-label {
            color: var(--stat-label);
            font-size: 0.78rem;
            font-weight: 700;
        }
        .breeding-combo-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .breeding-combo {
            display: grid;
            grid-template-columns: minmax(120px, 1fr) auto minmax(120px, 1fr) auto minmax(92px, 0.75fr);
            align-items: center;
            gap: 12px;
            padding: 16px;
            border: 1px solid #efd6a4;
            border-radius: 16px;
            background: linear-gradient(180deg, var(--card-bg), var(--filter-bg));
        }
        .breeding-op {
            color: #d9480f;
            font-size: 1.35rem;
            font-weight: 900;
            text-align: center;
        }
        .breeding-option-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #f4e3c7;
        }
        .breeding-option-divider {
            color: var(--stat-label);
            font-size: 0.72rem;
            font-weight: 900;
        }
        .breeding-flower-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 0;
            text-align: center;
        }
        .breeding-flower-node span {
            max-width: 100%;
            color: var(--stat-value);
            font-size: 0.72rem;
            font-weight: 800;
            overflow-wrap: anywhere;
        }
        .breeding-empty {
            padding: 18px;
            border: 1px dashed var(--border-subtle);
            border-radius: 14px;
            color: var(--stat-label);
            text-align: center;
            font-weight: 700;
        }
        .flower-breeding-modal .modal-footer {
            border-top: 1px solid var(--border-subtle);
            background: var(--filter-bg);
            padding: 14px 18px;
        }
        .flower-breeding-modal .btn-breeding-close {
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 12px 16px;
            background: var(--text-color);
            color: var(--card-bg);
            font-weight: 900;
        }
        [data-theme='dark'] .flower-breeding-modal .modal-content {
            border-color: var(--border-subtle);
            background: var(--card-bg);
            color: var(--text-color);
        }
        [data-theme='dark'] .flower-breeding-modal .btn-close {
            filter: invert(1);
        }
        [data-theme='dark'] .breeding-section-label {
            border-color: rgba(255, 214, 224, 0.24);
            background: rgba(255, 247, 250, 0.05);
            color: #ff9fb1;
        }
        [data-theme='dark'] .breeding-combo {
            border-color: rgba(245, 158, 11, 0.32);
            background: linear-gradient(180deg, var(--card-bg), var(--filter-bg));
        }
        [data-theme='dark'] .breeding-op {
            color: #ffc078;
        }
        [data-theme='dark'] .breeding-option-group {
            border-bottom-color: rgba(255, 255, 255, 0.12);
        }
        @media (max-width: 575.98px) {
            .flower-breeding-modal .modal-dialog {
                margin: 12px;
            }
            .breeding-combo {
                grid-template-columns: 1fr;
            }
            .breeding-op {
                line-height: 1;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const breedingModalEl = document.getElementById('flowerBreedingModal');
            const breedingTitleEl = document.getElementById('flowerBreedingTitleText');
            const breedingIconEl = document.getElementById('flowerBreedingTitleImg');
            const breedingBodyEl = document.getElementById('flowerBreedingBody');

            function stars(count) {
                const safeCount = Math.min(Math.max(count, 1), 5);
                return '★'.repeat(safeCount) + '☆'.repeat(5 - safeCount);
            }

            function collectFlowerImages(card) {
                const legacyUrls = Array.from(card.querySelectorAll('.flower-legacy-image-data'))
                    .map(s => s.dataset.src)
                    .filter(Boolean);
                if (legacyUrls.length > 0) return legacyUrls;

                const mainImg = card.querySelector('.flower-main-img');
                return mainImg && mainImg.getAttribute('src') ? [mainImg.getAttribute('src')] : [];
            }

            function collectFlowerVariants(card, name) {
                const variants = Array.from(card.querySelectorAll('.flower-variant-data'))
                    .map((el, index) => ({
                        sort: Number(el.dataset.sort || index),
                        stars: Number(el.dataset.stars || index + 1),
                        colorName: el.dataset.colorName || `${index + 1}성`,
                        imageUrl: el.dataset.imageUrl || ''
                    }))
                    .filter(v => v.imageUrl);
                if (variants.length > 0) return variants;

                return collectFlowerImages(card).map((src, index) => ({
                    sort: index,
                    stars: index + 1,
                    colorName: `${name} ${index + 1}성`,
                    imageUrl: src
                }));
            }

            function collectFlowerRules(card, variantMap) {
                return Array.from(card.querySelectorAll('.flower-rule-data'))
                    .map(ruleEl => {
                        const result = variantMap.get(Number(ruleEl.dataset.resultSort));
                        const leftOptions = Array.from(ruleEl.querySelectorAll('.rule-left-option'))
                            .map(el => variantMap.get(Number(el.dataset.sort)))
                            .filter(Boolean);
                        const rightOptions = Array.from(ruleEl.querySelectorAll('.rule-right-option'))
                            .map(el => variantMap.get(Number(el.dataset.sort)))
                            .filter(Boolean);
                        return {
                            result,
                            leftOptions,
                            rightOptions,
                            note: ruleEl.dataset.note || ''
                        };
                    })
                    .filter(rule => rule.result && rule.leftOptions.length > 0 && rule.rightOptions.length > 0);
            }

            function nodeHtml(src, label) {
                return `
                    <div class="breeding-flower-node">
                        <img src="${src}" alt="${label}">
                        <span>${label}</span>
                    </div>
                `;
            }

            function optionGroupHtml(items) {
                return `
                    <div class="breeding-option-group">
                        ${items.map((item, index) => `
                            ${index > 0 ? '<span class="breeding-option-divider">or</span>' : ''}
                            ${nodeHtml(item.imageUrl || item.src, item.colorName || item.label)}
                        `).join('')}
                    </div>
                `;
            }

            function buildBreedingHtml(button) {
                const card = button.closest('.wiki-item-card');
                const name = button.dataset.flowerName || card.dataset.name || '꽃';
                const level = button.dataset.level || '-';
                const growthTime = button.dataset.growthTime || '-';
                const variants = collectFlowerVariants(card, name);
                const variantMap = new Map(variants.map(v => [v.sort, v]));
                const structuredRules = collectFlowerRules(card, variantMap);
                const mainImage = variants[0] ? variants[0].imageUrl : '';

                breedingTitleEl.textContent = `${name} 교배 가이드`;
                breedingIconEl.src = mainImage;
                breedingIconEl.alt = name;
                breedingIconEl.style.display = mainImage ? 'block' : 'none';

                const gradeHtml = variants.length
                    ? variants.map((variant, index) => `
                        <div class="breeding-grade">
                            <img src="${variant.imageUrl}" alt="${variant.colorName || name}">
                            <div class="breeding-grade-stars">${stars(variant.stars || index + 1)}</div>
                            <div class="breeding-grade-label">${variant.colorName || `${index + 1}성`}</div>
                        </div>
                    `).join('')
                    : '<div class="breeding-empty">등록된 꽃 이미지가 없습니다.</div>';

                let comboHtml = '';
                if (structuredRules.length > 0) {
                    comboHtml = structuredRules.map(rule => `
                        <div class="breeding-combo">
                            ${optionGroupHtml(rule.leftOptions)}
                            <div class="breeding-op">×</div>
                            ${optionGroupHtml(rule.rightOptions)}
                            <div class="breeding-op">=</div>
                            ${nodeHtml(rule.result.imageUrl, rule.result.colorName || '결과')}
                        </div>
                    `).join('');
                } else if (variants.length >= 3) {
                    comboHtml = variants.slice(2, 6).map((result, index) => {
                        const left = variants[Math.max(index, 0)] || variants[0];
                        const right = variants[index + 1] || variants[1] || variants[0];
                        const leftOptions = [
                            left
                        ];
                        const rightOptions = [
                            right
                        ];
                        if (variants[index + 2] && variants[index + 2] !== right && index > 0) {
                            rightOptions.push(variants[index + 2]);
                        }
                        return `
                            <div class="breeding-combo">
                                ${optionGroupHtml(leftOptions)}
                                <div class="breeding-op">×</div>
                                ${optionGroupHtml(rightOptions)}
                                <div class="breeding-op">=</div>
                                ${nodeHtml(result.imageUrl, result.colorName || `${name} ${index + 3}성`)}
                            </div>
                        `;
                    }).join('');
                } else if (variants.length === 2) {
                    comboHtml = `
                        <div class="breeding-combo">
                            ${optionGroupHtml([variants[0]])}
                            <div class="breeding-op">×</div>
                            ${optionGroupHtml([variants[1]])}
                            <div class="breeding-op">=</div>
                            ${nodeHtml(variants[1].imageUrl, variants[1].colorName || '교배 결과')}
                        </div>
                    `;
                } else {
                    comboHtml = '<div class="breeding-empty">교배 조합을 표시하려면 꽃 이미지를 2개 이상 등록해주세요.</div>';
                }

                return `
                    <div class="breeding-meta-row">
                        <span class="breeding-chip"><i class="fas fa-layer-group"></i> Lv.${level}</span>
                        <span class="breeding-chip"><i class="far fa-clock"></i> 성장시간: ${growthTime}</span>
                        <span class="breeding-chip"><i class="fas fa-images"></i> 꽃 ${variants.length}종</span>
                    </div>
                    <div class="breeding-section-label"><i class="fas fa-star"></i> 성급별 꽃 요약</div>
                    <div class="breeding-grade-strip">${gradeHtml}</div>
                    <div class="breeding-section-label"><i class="fas fa-seedling"></i> 교배 조합표</div>
                    <div class="breeding-combo-list">${comboHtml}</div>
                `;
            }

            document.querySelectorAll('.flower-breeding-btn').forEach(function (button) {
                button.addEventListener('click', function () {
                    if (!breedingModalEl || !breedingBodyEl) return;
                    breedingBodyEl.innerHTML = buildBreedingHtml(button);
                    bootstrap.Modal.getOrCreateInstance(breedingModalEl).show();
                });
            });

            new WikiFilter({
                gridId: 'wikiGrid',
                tableId: 'wikiTable',
                itemSelector: '.wiki-item-card',
                filters: [
                    { id: 'eventFilter', dataKey: 'event', autoPopulate: true },
                    { id: 'levelFilter', dataKey: 'level', type: 'multi' }
                ]
            });
        });
    </script>

                        <div id="variantSlotList" class="d-flex flex-column gap-2"></div>

                            <i class="fas fa-plus me-1"></i>성급 꽃 추가
                        </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-data.js?v=1.1" defer></script>
    <script>
    (function () {
        const modal = document.getElementById('addFlowerModal');
        if (!modal) return;

        const slotList = document.getElementById('variantSlotList');
        const addBtn   = document.getElementById('addVariantSlotBtn');
        const ruleList = document.getElementById('breedingRuleList');
        const addRuleBtn = document.getElementById('addBreedingRuleBtn');
        let pendingEditTrigger = null;

        function variantLabel(row, index) {
            const stars = row.querySelector('[name="variantStars"]')?.value || '?';
            const color = row.querySelector('[name="variantColorNames"]')?.value || `꽃 ${index + 1}`;
            return `${index + 1}. ${stars}성 ${color}`;
        }

        function createSlot(data = {}) {
            const wrap = document.createElement('div');
            wrap.className = 'flower-variant-editor border rounded-3 p-2';
            wrap.innerHTML = `
                <div class="row g-2 align-items-end">
                    <div class="col-md-1">
                        <label class="form-label small text-muted mb-1">순서</label>
                        <div class="variant-number fw-bold text-muted">${slotList.children.length + 1}</div>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small text-muted mb-1">성급</label>
                        <input type="number" name="variantStars" class="form-control form-control-sm" min="1" max="5" value="${data.stars || ''}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small text-muted mb-1">색상명</label>
                        <input type="text" name="variantColorNames" class="form-control form-control-sm" value="${data.colorName || ''}" placeholder="빨간색">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small text-muted mb-1">이미지</label>
                        <input type="hidden" name="variantExistingImageUrls" value="${data.imageUrl || ''}">
                        <input type="file" name="variantImageFiles" class="form-control form-control-sm" accept="image/*">
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-outline-danger btn-sm remove-slot-btn"><i class="fas fa-times"></i></button>
                    </div>
                    ${data.imageUrl ? `<div class="col-12"><img src="${data.imageUrl}" alt="" style="height:42px;object-fit:contain;border-radius:6px;"></div>` : ''}
                </div>
            `;
            wrap.querySelector('.remove-slot-btn').addEventListener('click', function () {
                wrap.remove();
                renumberSlots();
                refreshRuleOptions();
            });
            wrap.querySelectorAll('[name="variantStars"], [name="variantColorNames"]').forEach(input => {
                input.addEventListener('input', refreshRuleOptions);
            });
            slotList.appendChild(wrap);
            refreshRuleOptions();
        }

        function renumberSlots() {
            slotList.querySelectorAll('.flower-variant-editor').forEach((row, i) => {
                row.querySelector('.variant-number').textContent = i + 1;
            });
        }

        addBtn && addBtn.addEventListener('click', () => createSlot({}));

        function createRule(data = {}) {
            const wrap = document.createElement('div');
            wrap.className = 'flower-rule-editor border rounded-3 p-2';
            wrap.innerHTML = `
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">왼쪽 후보</label>
                        <select class="form-select form-select-sm rule-left-select" multiple size="3"></select>
                        <input type="hidden" name="breedingLeftIndexes" value="${data.left || ''}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">오른쪽 후보</label>
                        <select class="form-select form-select-sm rule-right-select" multiple size="3"></select>
                        <input type="hidden" name="breedingRightIndexes" value="${data.right || ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted mb-1">결과</label>
                        <select class="form-select form-select-sm rule-result-select" name="breedingResultIndexes"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">메모</label>
                        <input type="text" name="breedingNotes" class="form-control form-control-sm" value="${data.note || ''}" placeholder="그저 가능 등">
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-outline-danger btn-sm remove-rule-btn"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `;
            wrap.querySelector('.remove-rule-btn').addEventListener('click', () => wrap.remove());
            wrap.querySelectorAll('select').forEach(select => select.addEventListener('change', syncRuleHiddenInputs));
            ruleList.appendChild(wrap);
            refreshRuleOptions();
            if (data.left) selectCsv(wrap.querySelector('.rule-left-select'), data.left);
            if (data.right) selectCsv(wrap.querySelector('.rule-right-select'), data.right);
            if (data.result !== undefined && data.result !== null && data.result !== '') {
                wrap.querySelector('.rule-result-select').value = String(data.result);
            }
            syncRuleHiddenInputs();
        }

        function selectCsv(select, csv) {
            String(csv).split(/[|,]/).forEach(value => {
                const option = select.querySelector(`option[value="${value.trim()}"]`);
                if (option) option.selected = true;
            });
        }

        function refreshRuleOptions() {
            const variantRows = Array.from(slotList.querySelectorAll('.flower-variant-editor'));
            const options = variantRows.map((row, index) => ({ value: String(index), label: variantLabel(row, index) }));
            ruleList.querySelectorAll('.flower-rule-editor').forEach(rule => {
                const selects = [
                    rule.querySelector('.rule-left-select'),
                    rule.querySelector('.rule-right-select'),
                    rule.querySelector('.rule-result-select')
                ];
                selects.forEach(select => {
                    const selected = Array.from(select.selectedOptions).map(option => option.value);
                    select.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join('');
                    selected.forEach(value => {
                        const option = select.querySelector(`option[value="${value}"]`);
                        if (option) option.selected = true;
                    });
                });
            });
            syncRuleHiddenInputs();
        }

        function syncRuleHiddenInputs() {
            ruleList.querySelectorAll('.flower-rule-editor').forEach(rule => {
                const left = Array.from(rule.querySelector('.rule-left-select').selectedOptions).map(option => option.value).join('|');
                const right = Array.from(rule.querySelector('.rule-right-select').selectedOptions).map(option => option.value).join('|');
                rule.querySelector('[name="breedingLeftIndexes"]').value = left;
                rule.querySelector('[name="breedingRightIndexes"]').value = right;
            });
        }

        addRuleBtn && addRuleBtn.addEventListener('click', () => createRule());

        document.addEventListener('click', function (e) {
            const editBtn = e.target.closest('.btn-admin-edit[data-modal-target="addFlowerModal"]');
            if (editBtn) {
                pendingEditTrigger = editBtn;
                return;
            }

            const addFlowerBtn = e.target.closest('.btn-admin-add[data-bs-target="#addFlowerModal"]');
            if (addFlowerBtn) {
                pendingEditTrigger = null;
                slotList.innerHTML = '';
                ruleList.innerHTML = '';
            }
        }, true);

        // 수정 모달 열릴 때 flowerId로 API 호출 → 기존 variant 이미지 슬롯 복원
        modal.addEventListener('show.bs.modal', function (e) {
            slotList.innerHTML = '';
            ruleList.innerHTML = '';
            const trigger = e.relatedTarget || pendingEditTrigger;
            if (!trigger) {
                return;
            }

            const itemJson = trigger.dataset.item;
            if (!itemJson) return;

            let item;
            try { item = JSON.parse(itemJson); } catch { return; }
            if (!item.id) return;

            const card = trigger.closest('.wiki-item-card');
            const variantNodes = card ? Array.from(card.querySelectorAll('.flower-variant-data')) : [];
            if (variantNodes.length > 0) {
                const sortToIndex = new Map();
                variantNodes.forEach((node, index) => {
                    sortToIndex.set(String(node.dataset.sort || index), index);
                    createSlot({
                        stars: node.dataset.stars || '',
                        colorName: node.dataset.colorName || '',
                        imageUrl: node.dataset.imageUrl || ''
                    });
                });
                card.querySelectorAll('.flower-rule-data').forEach(rule => {
                    const left = Array.from(rule.querySelectorAll('.rule-left-option'))
                        .map(option => sortToIndex.get(String(option.dataset.sort)))
                        .filter(index => index !== undefined)
                        .join('|');
                    const right = Array.from(rule.querySelectorAll('.rule-right-option'))
                        .map(option => sortToIndex.get(String(option.dataset.sort)))
                        .filter(index => index !== undefined)
                        .join('|');
                    createRule({
                        left,
                        right,
                        result: sortToIndex.get(String(rule.dataset.resultSort)),
                        note: rule.dataset.note || ''
                    });
                });
                return;
            }

            fetch(`/wiki/admin/data/flower/${item.id}/images`)
                .then(r => r.json())
                .then(images => {
                    images.forEach((img, index) => createSlot({ imageUrl: img.imageUrl, stars: index + 1 }));
                })
                .catch(() => {});
        });

        modal.addEventListener('hidden.bs.modal', function () {
            pendingEditTrigger = null;
        });

        modal.querySelector('form').addEventListener('submit', syncRuleHiddenInputs);
    })();
    </script>
</body>
