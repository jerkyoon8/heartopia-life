<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두근두근 타운의 지도입니다.</title>
    <th:block th:replace="~{fragments/common-head :: common_head}"></th:block>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Map CSS -->
    <link rel="stylesheet" th:href="@{/css/map.css(v=1.1)}">

    <style>
        /* Paperlogy Font */
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        /* Page Title Section */
        .map-page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .map-page-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.15);
        }

        .map-page-title {
            font-family: 'Paperlogy', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin: 0 0 8px;
        }

        .map-page-desc {
            font-family: 'Paperlogy', sans-serif;
            font-size: 14px;
            color: #888;
            margin: 0;
            line-height: 1.6;
        }

        /* Breadcrumb */
        .map-breadcrumb {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 25px;
        }

        .map-breadcrumb a {
            color: #999;
            text-decoration: none;
        }

        .map-breadcrumb a:hover {
            color: #0d6efd;
        }

        .map-breadcrumb .separator {
            margin: 0 8px;
        }
    </style>
</head>

<body>

    <!-- Top Navigation Bar (Common Fragment) -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Body -->
    <div class="mw-body">

        <!-- Breadcrumb -->
        <div class="map-breadcrumb">
            <a th:href="@{/wiki}"><i class="fas fa-home"></i> Home</a>
            <span class="separator">›</span>
            <span>Map</span>
        </div>

        <!-- Page Title -->
        <div class="map-page-header">
            <div class="map-page-icon">🗺️</div>
            <h1 class="map-page-title">두근두근 타운의 지도입니다.</h1>
            <p class="map-page-desc">
                두근두근 타운의 인터랙티브 맵입니다.<br>
                주민, 상점, 버스 정류장 등 다양한 위치를 확인하세요.
            </p>
        </div>

        <!-- Map Layout: Side Panel + Map -->
        <div class="map-layout">

            <!-- Left Side Panel (항상 보이는 외부 패널) -->
            <div class="map-side-panel" id="mapSidePanel">
                <div class="side-panel-header">
                    <h3>📍 핀 관리</h3>
                </div>

                <div class="side-panel-search">
                    <input type="text" id="pinSearch" placeholder="핀 검색..." />
                </div>

                <div class="side-panel-controls">
                    <button class="btn-control" id="showAll" title="전체 표시">
                        <i class="fas fa-eye"></i> 전체 표시
                    </button>
                    <button class="btn-control" id="hideAll" title="전체 끄기">
                        <i class="fas fa-eye-slash"></i> 전체 끄기
                    </button>
                </div>

                <div class="side-panel-categories" id="categoryList">
                    <!-- JS로 동적 생성 -->
                </div>
            </div>

            <!-- Right: Map Area -->
            <div class="map-area">
                <!-- Placement Mode Banner -->
                <div class="placement-banner" id="placementBanner">
                    <div class="placement-banner-content">
                        <span class="placement-banner-icon">📌</span>
                        <span class="placement-banner-text" id="placementText">배치할 항목을 선택하세요</span>
                        <button class="placement-cancel-btn" id="placementCancel">
                            <i class="fas fa-times"></i> 취소
                        </button>
                    </div>
                </div>

                <!-- Toast Notification -->
                <div class="map-toast" id="mapToast">
                    <span class="map-toast-icon">✅</span>
                    <span class="map-toast-text" id="mapToastText"></span>
                </div>

                <!-- Info Box (Bottom Left) for Fish, Insect, Bird -->
                <div class="map-info-box" id="mapInfoBox">
                    <button class="info-box-close" id="infoBoxClose"><i class="fas fa-times"></i></button>
                    <div id="infoBoxContent"></div>
                </div>

                <!-- Leaflet Map -->
                <div id="map"></div>
            </div>

        </div>

    </div>

    <!-- Footer (Common Fragment) -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script th:src="@{/js/map.js(v=1.12)}"></script>
</body>

</html>
