spring.application.name=heartopia-wiki
spring.config.import=optional:classpath:application-secret.properties

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/heartopia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=wiki_user
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database Initialization
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:sql/schema-villagers.sql,classpath:sql/schema-location-zones.sql,classpath:sql/schema-users.sql

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.heartopia.wiki.model
mybatis.configuration.map-underscore-to-camel-case=true

# Wiki Admin Configuration
# spring.security.user.name=admin (SecurityConfig에서 설정됨)

# ==========================================
# [성능 최적화] Gzip 압축
# ==========================================
# HTML, CSS, JS, JSON 응답을 gzip으로 압축 (전송량 50~70% 절감)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,text/plain,text/xml
server.compression.min-response-size=1024

# ==========================================
# [성능 최적화] 정적 리소스 캐시 + Content Hash 전략
# ==========================================
# 이미지/CSS/JS에 1년 캐시 적용 (재방문자 로딩 속도 향상)
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true
# 파일 내용 기반 해시를 URL에 자동 추가 → CSS/JS 변경 시 브라우저 캐시 자동 무효화
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# ==========================================
# [성능 최적화] HikariCP 커넥션 풀
# ==========================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HeartopiaHikariPool

# ==========================================
# [성능 최적화] Thymeleaf 템플릿 캐시
# ==========================================
# 운영 환경에서 템플릿을 메모리에 캐싱 (서버 재시작 시 자동 초기화됨)
spring.thymeleaf.cache=true

# ==========================================
# [성능 최적화] 로그 레벨
# ==========================================
# SQL 전체 로그 제거 (I/O 부하 감소). 디버깅 필요 시 INFO로 변경
logging.level.com.heartopia.wiki.mapper=WARN
# 강제로 화면에 성능 측정 속도 띄우기
logging.level.com.heartopia.wiki.aop=DEBUG

# ==========================================
# [파일 업로드] Multipart 설정
# ==========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads