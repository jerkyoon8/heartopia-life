name: Deploy Open Source Server

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Git 최신 코드 불러오기
        run: |
          cd ~/heartopia-life
          # 서버에서 직접 수정될 수 있는 deploy/ 파일들 충돌 방지
          git restore deploy/nginx/nginx.conf || true
          git restore deploy/healthwatch.sh || true
          git pull origin main
          
      - name: 무중단(Blue-Green) 배포 스크립트 실행
        run: |
          cd ~/heartopia-life/deploy
          chmod +x deploy.sh
          ./deploy.sh
          
      - name: 사용하지 않는 Docker 쓰레기 옵션 정리
        run: docker image prune -a -f
